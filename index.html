<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropis Message Lite 🛰️</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header Estilo Dropis */
        .header { background: #1a1a1a; padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid #ffd700; color: #ffd700; letter-spacing: 1px; }
        #mi-id-display { font-size: 11px; color: #888; margin-top: 4px; font-family: monospace; }

        /* Area de Chat */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        
        .msg-burbuja { padding: 12px 16px; border-radius: 18px; max-width: 75%; word-wrap: break-word; position: relative; font-size: 14px; line-height: 1.4; }
        .msg-izquierda { background: #262d31; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 4px solid #ffd700; }
        .msg-derecha { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        /* Inputs Inferiores */
        .input-area { background: #1a1a1a; padding: 12px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #333; }
        .input-id { width: 70px; background: #000; color: #ffd700; border: 1px solid #444; border-radius: 10px; padding: 10px; text-align: center; font-weight: bold; }
        .input-msg { flex: 1; background: #2a2a2a; border: none; padding: 12px 15px; border-radius: 20px; color: white; outline: none; }
        .btn-send { background: #ffd700; color: black; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-send:active { transform: scale(0.9); }

        /* Modales */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 25px; border: 1px solid #ffd700; width: 100%; max-width: 380px; text-align: center; }
        
        .btn-gold { width: 100%; background: #ffd700; color: black; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>
<body>

    <div class="header" onclick="manejarBotonIdentidad()">
        DROPIS CHAT LITE 🛰️
        <div id="mi-id-display">Sincronizando Antena...</div>
    </div>

    <div id="chat-box">
        <p style="color: #666; text-align: center; font-size: 12px;">Cifrado de extremo a extremo activo</p>
    </div>

    <div class="input-area">
        <input type="text" id="target-id" class="input-id" placeholder="ID" maxlength="12">
        <input type="text" id="msg-text" class="input-msg" placeholder="Escribe un mensaje satelital...">
        <button class="btn-send" onclick="enviarMensajeSatelital()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <div id="modal-registro" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: #ffd700;">Registro Dropis</h2>
            <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Vincula tu identidad para activar la antena.</p>
            <input type="text" id="reg-nombre" placeholder="Nombre">
            <input type="text" id="reg-apellido" placeholder="Apellido">
            <button class="btn-gold" onclick="ejecutarRegistroCompleto()">
                <i class="fas fa-fingerprint"></i> REGISTRAR CON HUELLA
            </button>
        </div>
    </div>

    <div id="modal-qr" class="modal-overlay">
        <div class="modal-content" style="background: white;">
            <h3 style="color: #333;">Mi Identidad Dropis</h3>
            <div id="contenedor-qr"></div>
            <button onclick="cerrarModalQR()" style="margin-top: 20px; width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 10px; font-weight: bold;">CERRAR</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.4/dist/protobuf.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCaUyhX2iBMl4A5xeKeu_4SeE6HClp4V1s",
            authDomain: "real-market-elite-2025.firebaseapp.com",
            projectId: "real-market-elite-2025",
            databaseURL: "https://real-market-elite-2025-default-rtdb.firebaseio.com",
            storageBucket: "real-market-elite-2025.appspot.com",
            messagingSenderId: "226489002778",
            appId: "1:226489002778:web:6722d21a9e78b33b5b1aa3"
        };

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();
        const miVapidKey = 'BIrsA9YbBXfIuo4PTMrKRtuktRsK2RbK0XevupuofGGOUDy9w5VZ9yaXbZXsenXppmFsR62-2B7jBOG0Z8RdxvU';

        // --- PUENTE HACIA APP.JS ---
        function enviarMensajeSatelital() {
            if (typeof window.enviarMensajeUI === 'function') {
                window.enviarMensajeUI();
            } else {
                console.error("Esperando carga de motor en app.js...");
            }
        }

        function cerrarModalQR() {
            document.getElementById('modal-qr').style.display = 'none';
        }

        // --- LÓGICA DE ANTENA (SERVICE WORKER) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./firebase-messaging-sw.js?v=7')
                    .then(reg => {
                        console.log("🚀 Antena Dropis Operativa");
                        // Sincronizar Token
                        messaging.getToken({ vapidKey: miVapidKey, serviceWorkerRegistration: reg })
                            .then(token => { if(token) localStorage.setItem('fcm_token', token); });
                    });
            });

            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data.type === 'NUEVO_MENSAJE_SATELITAL' || event.data.type === 'RESPUESTA_NUBE') {
                    renderizarMensajeEnPantalla(event.data.texto, event.data.nombre || '🛰️ Satélite');
                }
            });
        }

        function renderizarMensajeEnPantalla(texto, remitente) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'msg-burbuja msg-izquierda';
            div.innerHTML = `<small style="color:#ffd700; font-weight:bold; font-size:10px;">${remitente}</small><br>${texto}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // --- CHEQUEO DE IDENTIDAD AL CARGAR ---
        window.addEventListener('DOMContentLoaded', () => {
            const miID = localStorage.getItem('mi_dropis_id');
            if (!miID) {
                document.getElementById('modal-registro').style.display = 'flex';
            } else {
                document.getElementById('mi-id-display').innerText = "Tu ID: " + miID;
            }
        });
    </script>

    <script src="js/app.js"></script>
    <script src="js/registro.js"></script>
    <script src="js/qr-generator.js"></script>
</body>
    </html>

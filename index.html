    <script>
        // 1. CONFIGURACIÓN Y REGISTRO DE ANTENA (INDISPENSABLE PARA EL TOKEN)
        
const firebaseConfig = {
    apiKey: "AIzaSyCaUyhX2iBMl4A5xeKeu4SeE6HClp4V1s",
    authDomain: "real-market-elite-2025.firebaseapp.com",
    projectId: "real-market-elite-2025",
    databaseURL: "https://real-market-elite-2025-default-rtdb.firebaseio.com",
    messagingSenderId: "226489002778",
    appId: "1:226489002778:web:6722d21a9e78b33b5b1aa3"
};
firebase.initializeApp(firebaseConfig);
const messaging = firebase.messaging();
const db = firebase.database();

// --- 2. MOTOR DE PERSISTENCIA (IndexedDB) ---
const dbNombre = "DropisDB";
const dbVersion = 1;

function abrirDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbNombre, dbVersion);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('mensajes')) db.createObjectStore('mensajes', { autoIncrement: true });
            if (!db.objectStoreNames.contains('usuario')) db.createObjectStore('usuario', { keyPath: 'id' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject("Error DB");
    });
}

async function guardarLocal(tabla, datos) {
    const db = await abrirDB();
    const tx = db.transaction(tabla, 'readwrite');
    tx.objectStore(tabla).put(datos);
}

// --- 3. SOLO REGISTRO Y RECUPERACIÓN ---

async function recuperarCuentaConID() {
    const idParaRecuperar = prompt("Escribe tu ID Dropis:");
    if (!idParaRecuperar) return;

    try {
        const snapshot = await firebase.database().ref('usuarios/' + idParaRecuperar).once('value');
        if (snapshot.exists()) {
            const datos = snapshot.val();
            // Restaurar en el teléfono
            localStorage.setItem('mi_dropis_id', idParaRecuperar);
            await guardarLocal('usuario', { 
                id: 'perfil_propietario', 
                dropis_id: idParaRecuperar,
                nombre: datos.nombre,
                apellido: datos.apellido,
                fcm_token: datos.fcm_token || '' 
            });
            alert(`🚀 ¡Identidad recuperada! Bienvenido ${datos.nombre}.`);
            location.reload(); 
        } else {
            alert("❌ ID no encontrado en el satélite.");
        }
    } catch (e) {
        alert("Error de conexión satelital.");
    }
}
async function ejecutarRegistroCompleto() {
    const nombre = document.getElementById('reg-nombre').value.trim();
    const apellido = document.getElementById('reg-apellido').value.trim();
    
    if (!nombre || !apellido) return alert("Completa los datos");

    // 1. GENERACIÓN DEL ID CON LA LÓGICA SUB12
    // Genera algo como: TU_ID_DROPIS_SUB12_X8J2K
    const hash = Math.random().toString(36).substring(2, 7).toUpperCase();
    const idUnico = Math.random().toString(36).substring(2, 14); + hash; 

    // 2. PREPARAR DATOS PARA LOCAL (IndexedDB)
    const datosUsuario = { 
        id: 'perfil_propietario', 
        dropis_id: idUnico, 
        nombre: nombre, 
        apellido: apellido, 
        fecha: Date.now() 
    };

    // Guardar en el teléfono (Local)
    localStorage.setItem('mi_dropis_id', idUnico);
    await guardarLocal('usuario', datosUsuario);
    
    // Actualizar interfaz
    document.getElementById('modal-registro').style.display = 'none';
    document.getElementById('mi-id-display').innertext = "Tu ID: " + idUnico;
    
    const modalHuella = document.getElementById('modal-huella');
    if(modalHuella) modalHuella.style.display = 'flex';

    try {
        // 3. OBTENER TOKEN SATELITAL (FCM)
        const registration = await navigator.serviceWorker.ready;
        const token = await messaging.getToken({ 
            vapidKey: 'BIrsA9YbBXfIuo4PTMrKRtuktRsK2RbK0XevupuofGGOUDy9w5VZ9yaXbZXsenXppmFsR62-2B7jBOG0Z8RdxvU',
            serviceWorkerRegistration: registration 
        });
        
        if (token) {
            localStorage.setItem('fcm_token', token);

            // 4. LÓGICA DE GUARDADO EN LA NUBE (LA QUE NECESITAS)
            // Esto crea una ruta: usuarios/TU_ID_DROPIS_SUB12_XXXXX/
            await db.ref('usuarios/' + idUnico).set({
                id_sistema: idUnico,
                nombre: nombre,
                apellido: apellido,
                fcm_token: token,
                estado: "activo",
                version: "LITE_SUB12",
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            console.log("✅ Sincronizado con éxito en la nube bajo: " + idUnico);
        }
        
        setTimeout(() => { if(modalHuella) modalHuella.style.display = 'none'; }, 3000);
    } catch (e) { 
        console.error("⚠️ Error en vinculación satelital:", e);
        // Aunque falle el token, el usuario ya se creó localmente
        setTimeout(() => { if(modalHuella) modalHuella.style.display = 'none'; }, 2000);
    }
}

// --- 4. ANTENA SATELITAL ---
async function activarAntena() {
    const miID = localStorage.getItem('mi_dropis_id');
    if (!miID) return;

    if (window.listenerActivo) window.listenerActivo.off(); 

    console.log("📡 Antena sintonizada en:", miID);
    window.listenerActivo = db.ref('cola_satelital/' + miID);
    
    window.listenerActivo.on('child_added', async (snapshot) => {
        const data = snapshot.val();
        if (!data || !data.p) return; // Si el paquete viene vacío, ignorar

        try {
            // 1. Cargar la estructura del mensaje
            const root = await cargarProto();
            const SuperAppPayload = root.lookupType("SuperAppPayload");
            
            // 2. Decodificar Base64 a binario y luego a Objeto
            const buffer = Uint8Array.from(atob(data.p), c => c.charCodeAt(0));
            const decoded = SuperAppPayload.decode(buffer);

            // 3. Guardar en historial local (IndexedDB)
            await guardarLocal('mensajes', {
    // Usamos 'data.p' o 'decoded.p' que es donde viene el texto real en tu red
    texto: decoded.chatText || "Mensaje sin texto",
    remitente: data.from || "Desconocido",
    ts: Date.now()
});
console.log("✅ Guardado automático ejecutado con éxito");

            // 4. Mostrar en pantalla
            pintarMensaje(decoded.chatText, 'msg-izquierda');
            
            // 5. Borrar de la nube (limpieza satelital) para no procesarlo dos veces
            snapshot.ref.remove(); 
            
        // Dentro de activarAntena...
} catch (e) { 
    console.error("❌ Error decodificando:", e);
    // Si falla el proto, intentamos mostrar que llegó algo crudo
    pintarMensaje("Error al decodificar paquete: " + data.p.substring(0,10) + "...", 'msg-izquierda');
        }
    });
}
       
        

async function enviarMensajeSatelital() {
const inputMsg = document.querySelector('#msg-text');
const inputTarget = document.querySelector('#target-id');
const msg = inputMsg ? inputMsg.value.trim() : "";
const targetID = inputTarget ? inputTarget.value.trim() : "";
const miID = localStorage.getItem('mi_dropis_id') || "ID_DESCONOCIDO";

    if (!targetID || !msg) return alert("ID y Mensaje son obligatorios");

    try {
        // 1. Preparamos el Payload (ProtoBuf)
        const root = await cargarProto();
        const SuperAppPayload = root.lookupType("SuperAppPayload");
        const payload = SuperAppPayload.create({ chatText: msg });
        const buffer = SuperAppPayload.encode(payload).finish();
        
        // 2. Convertimos a Base64 para el viaje satelital
        const base64 = btoa(String.fromCharCode.apply(null, buffer));
        // 3. Lo lanzamos a la cola del destinatario
        await db.ref('cola_satelital/' + targetID).push({
            p: base64,         // El paquete cifrado/empaquetado
            from: miID,        // Quién lo envía
            ts: Date.now()     // Marca de tiempo
        });

        // 4. Pintamos nuestro propio mensaje en la derecha
        pintarMensaje(msg, 'msg-derecha');
        if (inputMsg) inputMsg.value = "";
    
        console.log("🚀 Mensaje lanzado al espacio hacia:", targetID);

    } catch (e) {
        console.error("❌ Fallo en el lanzamiento:", e);
        alert("Error al enviar el mensaje.");
    }
}
// --- 4. GESTIÓN DE TOKENS Y SERVICE WORKER ---

// Registrar el Service Worker al cargar la página
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('firebase-messaging-sw.js')
        .then(registration => {
            console.log("🛰️ Antena (SW) lista para recibir señales");
            // Aquí llamarías a obtenerToken(registration) si ya tienes esa función lista
        })
        .catch(err => console.error("❌ Fallo en registro de antena:", err));
}
async function obtenerToken(registration) {
    try {
        const miVapidKey = 'BIrsA9YbBXfIuo4PTMrKRtuktRsK2RbK0XevupuofGGOUDy9w5VZ9yaXbZXsenXppmFsR62-2B7jBOG0Z8RdxvU';
        const token = await messaging.getToken({ 
            vapidKey: miVapidKey, 
            serviceWorkerRegistration: registration 
        });

        if (token) {
            console.log("🎫 TU TOKEN DROPIS:", token);
            localStorage.setItem('fcm_token', token);
            
            // Si el usuario ya tiene ID, actualizamos el token en la nube silenciosamente
            const miID = localStorage.getItem('mi_dropis_id');
            if (miID) {
                firebase.database().ref('usuarios/' + miID).update({ fcm_token: token });
            }
        }
    } catch (err) {
        console.warn("⚠️ No se pudo obtener el token:", err);
    }
}

// --- 5. LÓGICA DE INTERFAZ Y QR ---

function manejarBotonIdentidad() {
    const id = localStorage.getItem('mi_dropis_id');
    if (id) {
        document.getElementById('modal-qr').style.display = 'flex';
        const cont = document.getElementById('contenedor-qr');
        cont.innerHTML = "";
        new QRCode(cont, { 
            text: `dropisapp://perfil/${id}`, 
            width: 180, height: 180,
            colorDark: "#000000", colorLight: "#ffffff"
        });
        const p = document.createElement("p");
        p.innerText = "ID: " + id;
        p.style.cssText = "color: #333; font-weight: bold; margin-top: 10px;";
        cont.appendChild(p);
    } else {
        document.getElementById('modal-registro').style.display = 'flex';
    }
}

function cerrarModalQR() {
    document.getElementById('modal-qr').style.display = 'none';
}

// Arrancar la app
window.onload = () => {
    const id = localStorage.getItem('mi_dropis_id');
    if (id) {
        document.getElementById('mi-id-display').innerText = "Tu ID: " + id;
        activarAntena(); // <--- Aquí es donde el radar empieza a trabajar
    } else {
        document.getElementById('modal-registro').style.display = 'flex';
    }
};

async function cargarProto() {
    const schema = `
        package superapp;
        syntax = "proto3";
        message SuperAppPayload {
            string chatText = 1;
        }
    `;
    const root = protobuf.parse(schema).root;
    return root;
}


// --- 5. LÓGICA DE INTERFAZ CORREGIDA ---

/**
 * Pinta una burbuja de mensaje en el chat box.
 * @param {string} texto - El contenido del mensaje.
 * @param {string} clase - La clase CSS ('msg-izquierda' o 'msg-derecha').
 */
function pintarMensaje(texto, clase) {
    const box = document.getElementById('chat-box');
    if (!box) {
        console.error("❌ No se encontró el elemento 'chat-box'");
        return;
    }

    // Crear la burbuja del mensaje
    const div = document.createElement('div');
    div.className = 'msg-burbuja ' + clase;
    
    // Asignar el texto. Si no hay texto, poner un mensaje por defecto.
    div.innerText = texto || "Mensaje sin contenido";

    // --- ACTIVACIÓN DEL DOBLE CHECK (NUEVO) ---
    // Si el mensaje es enviado (derecha), activamos el double tick azul
    if (clase === 'msg-derecha') {
        // Esto activa la regla CSS: .msg-burbuja[data-enviado="3"]::after
        div.setAttribute('data-enviado', '3');
    }

    // Asegurar que el mensaje no se rompa visualmente
    div.style.wordWrap = 'break-word';

    // Añadir al chat box y hacer scroll hacia abajo
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    
    console.log(`✅ Mensaje pintado en la ${clase === 'msg-derecha' ? 'derecha' : 'izquierda'}`);
        }
        

</script>

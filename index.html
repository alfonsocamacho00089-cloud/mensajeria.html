<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dropis Message Lite 🛰️</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        :root {
            --primary: #FFD700; 
            --bg: #000000;      
            --surface: #1A1A1A; 
            --text: #FFFFFF;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Evita el rebote de la página completa */
        }

        /* --- HEADER --- */
        .header {
            background: var(--surface);
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 2px solid var(--primary);
            z-index: 1000;
        }

        #mi-id-display {
            font-size: 11px;
            color: var(--primary);
            font-family: monospace;
            margin-top: 4px;
        }

        /* --- CONTENEDOR DE SECCIONES --- */
        .calc-section {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .active {
            display: flex !important;
        }

        /* --- CHAT ENGINE (DESLIZABLE) --- */
        #chat-box {
            flex: 1;
            overflow-y: auto; /* Permite deslizar arriba y abajo */
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #000;
            -webkit-overflow-scrolling: touch; /* Suavidad en móviles */
        }

        .msg-burbuja {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .msg-derecha {
            align-self: flex-end;
            background-color: #005c4b; 
            color: white;
            border-bottom-right-radius: 2px;
        }

        .msg-izquierda {
            align-self: flex-start;
            background-color: #202c33; 
            color: white;
            border-bottom-left-radius: 2px;
            border-left: 3px solid var(--primary);
        }

        /* --- ÁREA DE ENTRADA --- */
        .input-area {
            background: var(--surface);
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid #333;
        }

        #target-id {
            width: 65px;
            background: #000;
            color: var(--primary);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px 5px;
            text-align: center;
            font-size: 12px;
        }

        #msg-text {
            flex: 1;
            background: #2a2a2a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 25px;
            outline: none;
        }

        .btn-enviar {
            background: var(--primary);
            color: black;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 18px;
        }

        /* --- MODALES --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--surface);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        input.form-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .oculto { display: none !important; }
    </style>
</head>
<body>

    <div class="header" onclick="manejarBotonIdentidad()">
        DROPIS CHAT LITE 🛰️
        <div id="mi-id-display">Cargando identidad...</div>
    </div>

    <div id="chat" class="calc-section active">
        <div id="chat-box">
            <p style="color: #666; text-align: center; font-size: 12px;">Conexión Satelital Encriptada</p>
        </div>

        <div class="input-area">
            <input type="text" id="target-id" placeholder="ID Destino">
            <input type="text" id="msg-text" placeholder="Escribe un mensaje...">
            <button class="btn-enviar" onclick="enviarMensajeSatelital()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="modal-registro" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: var(--primary);">Registro Dropis</h2>
            <p style="font-size: 12px; color: #aaa; margin-bottom: 20px;">Vincula tu identidad con biometría</p>
            <input type="text" id="reg-nombre" class="form-input" placeholder="Nombre">
            <input type="text" id="reg-apellido" class="form-input" placeholder="Apellido">
            <button onclick="ejecutarRegistroCompleto()" style="width: 100%; background: var(--primary); padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">
                <i class="fas fa-fingerprint"></i> REGISTRAR CON HUELLA
            </button>
        </div>
    </div>

    <div id="modal-qr" class="modal-overlay">
        <div class="modal-content" style="background: white;">
            <button onclick="cerrarModalQR()" style="float: right; background: none; border: none; font-size: 20px;">&times;</button>
            <h3 style="color: #333;">Mi Identidad Dropis</h3>
            <div id="contenedor-qr" style="padding: 10px; display: flex; flex-direction: column; align-items: center;">
                </div>
            <button onclick="cerrarModalQR()" style="margin-top: 15px; width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 8px;">CERRAR</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.4/dist/protobuf.min.js"></script>

    <script src="js/app.js"></script> 
    
    <script>
        // --- INICIALIZACIÓN DE EMERGENCIA ---
        // Este bloque asegura que el HTML y la lógica de Firebase estén listos.
        
        const configFirebase = {
            apiKey: "AIzaSyCaUyhX2iBMl4A5xeKeu_4SeE6HClp4V1s",
            authDomain: "real-market-elite-2025.firebaseapp.com",
            projectId: "real-market-elite-2025",
            databaseURL: "https://real-market-elite-2025-default-rtdb.firebaseio.com",
            storageBucket: "real-market-elite-2025.appspot.com",
            messagingSenderId: "226489002778",
            appId: "1:226489002778:web:6722d21a9e78b33b5b1aa3"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(configFirebase);
        }

        // --- PUENTE DE FUNCIONES ---
        function enviarMensajeSatelital() {
            if (typeof window.enviarMensajeSatelital === 'function') {
                window.enviarMensajeSatelital();
            } else {
                // Fallback si app.js no carga
                const input = document.getElementById('msg-text');
                if(input.value.trim() !== "") {
                    renderizarMensajeEnPantalla(input.value, "Tú");
                    input.value = "";
                }
            }
        }

        function renderizarMensajeEnPantalla(texto, remitente) {
            const box = document.getElementById('chat-box');
            if (!box) return;
            const div = document.createElement('div');
            const esMio = (remitente === "Tú");
            div.className = `msg-burbuja ${esMio ? 'msg-derecha' : 'msg-izquierda'}`;
            div.innerHTML = `<small style="font-size:9px; color: ${esMio ? '#99fadc' : 'var(--primary)'}">${remitente}</small><br>${texto}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function cerrarModalQR() {
            document.getElementById('modal-qr').style.display = 'none';
        }

        // --- ARRANQUE ---
        window.addEventListener('load', () => {
            const miID = localStorage.getItem('mi_dropis_id');
            if (!miID) {
                document.getElementById('modal-registro').style.display = 'flex';
            } else {
                document.getElementById('mi-id-display').innerText = "Tu ID: " + miID;
            }
        });
    </script>
</body>
    </html>

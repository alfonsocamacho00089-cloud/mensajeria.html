<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropis Message Lite 🛰️</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.4/dist/protobuf.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <style>
        /* --- VALORES ACTUALIZADOS --- */
        body { font-family: sans-serif; background: #000000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
        
        /* DISEÑO DE SEGURIDAD SUSTITUIDO (BLOQUE 2) */
        .msg-burbuja { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.5); margin: 2px 0; }
        .msg-izquierda { background-color: #005c4b; align-self: flex-start; border-left: 5px solid #25d366; color: white; }
        .msg-derecha { background-color: #2a2a2a; align-self: flex-end; border-bottom-right-radius: 2px; color: white; }
        
        .input-area { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; background: #2a2a2a; color: white; }
        button { background: #ffd700; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; }
        
        .header { background: #1a1a1a; padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid #ffd700; position: relative; }
        #mi-id-display { font-size: 11px; color: #ffd700; margin-top: 5px; font-family: monospace; }

        /* 1. SUSTITUCIÓN: BOTÓN QR DORADO FLOTANTE */
        .btn-qr-dropis {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #ffd700;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .msg-burbuja[data-enviado="3"]::after { content: " ✓✓"; font-size: 10px; color: #34b7f1; }
    </style>
</head>
<body>

    <div class="header">
        DROPSIS CHAT LITE 🛰️
        <div id="mi-id-display">Cargando identidad...</div>
        <button class="btn-qr-dropis" onclick="manejarBotonIdentidad()">🪪</button>
    </div>

    <div id="chat" style="display: flex; flex-direction: column; height: 80vh; width: 100%; background: #000;">
        <div id="chat-box">
            <p style="color: #888; text-align: center;">Conectando a DropisChat...</p>
        </div>
    </div>

    <div id="modal-registro" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: #fff; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; color: #333;">
            <h3 style="margin-bottom: 10px;">Vincular Dropis</h3>
            <p style="font-size: 14px; color: #666;">Ingresa tu ID para comenzar</p>
            <input type="text" id="input-registro-id" placeholder="Tu ID de usuario" style="width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; color: #000; background: #eee;">
            <button onclick="completarRegistro()" style="width: 100%; padding: 12px; background: #ffd700; border: none; border-radius: 10px; font-weight: bold; color: #000;">VINCULAR IDENTIDAD</button>
        </div>
    </div>

    <div id="modal-qr" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: #fff; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; position: relative;">
            <button onclick="cerrarModalQR()" style="position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 20px; cursor: pointer; color: #333;">&times;</button>
            <h3 style="color: #333; margin-bottom: 15px;">Mi Identidad Dropis</h3>
            <div id="contenedor-qr"></div>
            <button onclick="cerrarModalQR()" style="margin-top: 20px; width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 10px; font-weight: bold;">CERRAR</button>
        </div>
    </div>

    <div style="display: flex; gap: 8px; background: #1a1a1a; padding: 10px; border-radius: 15px; position: sticky; bottom: 10px; margin: 0 10px; z-index: 999; border-top: 1px solid #333;">
        <input type="text" id="target-id" placeholder="ID" style="width: 60px; background: #000; color: #ffd700; border: 1px solid #333; border-radius: 8px; text-align: center;">
        <input type="text" id="msg-text" placeholder="Escribe un mensaje..." style="flex-grow: 1; background: #2a2a2a; color: white; border: none; border-radius: 25px; padding: 12px; outline: none;">
        <button onclick="enviarMensajeSatelital()" style="background: #ffd700; color: black; border: none; border-radius: 5px; padding: 0 15px;">ENVIAR</button>
    </div>

    <script>
        // 1. CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCaUyhX2iBMl4A5xeKeu_4SeE6HClp4V1s",
            authDomain: "real-market-elite-2025.firebaseapp.com",
            projectId: "real-market-elite-2025",
            databaseURL: "https://real-market-elite-2025-default-rtdb.firebaseio.com",
            messagingSenderId: "226489002778",
            appId: "1:226489002778:web:6722d21a9e78b33b5b1aa3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const messaging = firebase.messaging();
        const miVapidKey = 'BIrsA9YbBXfIuo4PTMrKRtuktRsK2RbK0XevupuofGGOUDy9w5VZ9yaXbZXsenXppmFsR62-2B7jBOG0Z8RdxvU';

        // LÓGICA DE REGISTRO AUTOMÁTICO AL CARGAR
        window.onload = () => {
            const idGuardado = localStorage.getItem('mi_dropis_id');
            if (!idGuardado) {
                document.getElementById('modal-registro').style.display = 'flex';
            } else {
                document.getElementById('mi-id-display').innerText = "Tu ID: " + idGuardado;
            }
        };

        function completarRegistro() {
            const nuevoId = document.getElementById('input-registro-id').value.trim();
            if(nuevoId) {
                localStorage.setItem('mi_dropis_id', nuevoId);
                location.reload();
            }
        }

        async function manejarBotonIdentidad() {
            const idGuardado = localStorage.getItem('mi_dropis_id');
            if (idGuardado) {
                document.getElementById('modal-qr').style.display = 'flex';
                const cont = document.getElementById('contenedor-qr');
                cont.innerHTML = "";
                new QRCode(cont, { text: idGuardado, width: 200, height: 200 });
            }
        }

        function cerrarModalQR() {
            document.getElementById('modal-qr').style.display = 'none';
        }

        // LÓGICA DE ANTENA V7
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./firebase-messaging-sw.js?v=7')
                .then(reg => {
                    if (Notification.permission === 'granted') {
                        messaging.getToken({ vapidKey: miVapidKey, serviceWorkerRegistration: reg })
                            .then(token => { if(token) localStorage.setItem('fcm_token', token); });
                    }
                });
            
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data.type === 'NUEVO_MENSAJE_SATELITAL' || event.data.type === 'RESPUESTA_NUBE') {
                    renderizarMensajeEnPantalla(event.data.texto, event.data.nombre || '🛰️ Satélite');
                }
            });
        }

        function renderizarMensajeEnPantalla(texto, remitente) {
            const box = document.getElementById('chat-box');
            if (box) {
                const div = document.createElement('div');
                div.className = 'msg-burbuja msg-izquierda';
                div.innerHTML = `<small style="color:#25d366; font-weight:bold;">${remitente}</small><br>${texto}`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            }
        }

        function enviarMensajeSatelital() {
            const input = document.getElementById('msg-text');
            const texto = input.value.trim();
            if (texto === "") return;

            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'msg-burbuja msg-derecha';
            div.innerText = texto;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            input.value = "";
        }
    </script>
</body>
</html>

position: fixed; /* Esto evita que el body se desplace en navegadores móviles */

    display: flex;

     /* ... tus estilos ... */

               url('./assets/logo.webp');
    
 background-size: cover;

    background-repeat: no-repeat;
    
}
/* --- INPUT AREA --- */



/* --- INPUT AREA --- */

.contenedor-flotante {
    position: fixed; /* Se queda pegado a la pantalla, no al chat */
    
    left: 0;
    width: 100%;
    display: flex;
    align-items: flex-end;
    padding: 10px;
    gap: 8px;
z-index: 100;
    pointer-events: auto; /* IMPORTANTE: Para que puedas hacer clic en el input */
    bottom: 0;
    /* Efecto para que parezca que la foto sigue debajo */
    background: rgba(0, 0, 0, 0.1); 
    backdrop-filter: blur(5px); /* Opcional: desenfoca un poco para legibilidad */
    -webkit-backdrop-filter: blur(5px);
 
}

     
/* --- HEADER ESTILO WHATSAPP --- */
.header { 
    background: #1a1a1a; 
    padding: 0 15px;    
    display: flex;
    align-items: center;
    flex-shrink: 0; 
    height: 60px;
    border-bottom: 1px solid #333;
    z-index: 10;
    position: relative;
}

.header-content {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
}

.foto-perfil {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    background-color: #555;
}

.user-info {
    display: flex;
    flex-direction: column;
}

#nombre-dueño-header {
    font-size: 16px;
    font-weight: 500;
    margin: 0;
    color: white;
    line-height: 1.2;
}

.user-status {
    font-size: 12px;
    color: #8696a0;
    margin-top: 2px;
}
    

#msg-text {
    flex: 1;
    background: rgba(32, 44, 51, 0.9); /* Un gris oscuro con transparencia */
    backdrop-filter: blur(10px);        /* Efecto cristal */
    border-radius: 25px;
    padding: 12px 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    height: 50px;
    max-height: 120px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3); /* Sombrita para que flote */
}

#btn-enviar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #ffd700; /* Dorado sólido o con glass */
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* Efecto cuando pasas el dedo o el mouse */
button#btn-enviar:active {
    background: rgba(255, 215, 0, 0.6); /* Se oscurece un poco al tocarlo */
    transform: scale(0.9);
 }
.msg-burbuja { 
    max-width: 85%; 
    width: fit-content; 
    padding: 8px 10px 6px 10px; 
    border-radius: 15px; 
    font-size: 15px; 
    
    position: relative; 
    word-wrap: break-word; 
    margin-bottom: 2px;
    display: inline-block; /* <--- CAMBIA flex por block */
    line-height: 1.2;

}



/* Forzamos que el icono sea visible */
.status-icon {
    display: inline-block !important;
    width: auto !important;
    height: auto !important;
    font-family: "Font Awesome 6 Free", "Font Awesome 5 Free" !important;
    font-weight: 900 !important; /* Vital para que carguen los iconos "Solid" */
    font-style: normal !important;
    margin-left: 4px;
}

.msg-info {
    
    
    display: felx;
    align-items: center;
    white-space: nowrap;

    float: right; /* <--- Esto la manda a la derecha del texto */
    font-size: 10px;
    opacity: 0.7;
    margin-top:8px; /* Ajusta para que baje un poquito y quede a nivel de la última línea */
    margin-left: 10px; /* Separación del texto */
    gap: 3px;

}

.msg-derecha { 
    align-self: flex-end; 
    background: linear-gradient(135deg, rgba(0, 92, 75, 0.8) 0%, rgba(0, 77, 64, 0.8) 100%); 
    color: #ffffff; 
    border-bottom-right-radius: 15px; 
    border-top-right-radius: 2px;
}

.msg-izquierda { 
    align-self: flex-start; 
    background: rgba(32, 44, 51, 0.8); 
    color: #ffffff; 
    border-bottom-left-radius: 20px; 
    
     border-top-left-radius: 2px;
}

/* Si el mensaje de la izquierda va seguido de otro de la izquierda */
.msg-izquierda + .msg-izquierda {
    border-top-left-radius: 4px; /* Hace que la esquina de arriba sea más cuadrada */
}

/* Si el mensaje de la derecha va seguido de otro de la derecha */
.msg-derecha + .msg-derecha {
    border-top-right-radius: 4px;
}

/* Colores para tus iconos de estado */
.status-icon.leido { color: #34b7f1; }
.status-icon.recibido { color: #8696a0; }
.status-icon.enviado { color: #8696a0; }



.menu-mensaje div {
    padding: 10px 20px;

    font-size: 14px;
    cursor: pointer;
}

.menu-mensaje div:hover {
    background: #3b4a54;

/* 1. EL FONDO NEGRO DETRÁS DEL MODAL */
/* EL MODAL: Usa 'dvh' para que ignore el teclado y no se encoja */
.modal {
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: #000000; 
    
    z-index: 1000; 
    transition: all 0.5s ease;
}


     
/* 2. EL CONTENIDO (Pantalla Completa con Fondo) */
.modal-content { 
    background-color: #0b141a;
    /* Aplicamos el fondo con el logo igual que en tu chat */
    background-image: linear-gradient(rgba(11, 20, 26, 0.9), rgba(11, 20, 26, 0.9)), 
                      url('./assets/logo.webp');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    
    width: 100%; 
    
    display: flex;
    
    flex-direction: column; /* Esto permite que el header esté arriba y el botón abajo */
    color: white; 
    animation: fadeIn 0.4s ease; 
    
    height: 100dvh; /* Usa el alto dinámico para móviles */
margin: 0;
    
    /* Agrega estas dos líneas: */
    overflow: hidden;
    justify-content: space-between;
}
/* 3. LAS FILAS DE CONTACTOS (Estilo WhatsApp) */
.fila-contacto {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px;
    cursor: pointer;
    background: rgba(32, 44, 51, 0.6); /* Fondo semi-transparente para ver el logo atrás */
    border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    transition: background 0.3s ease;
    text-align: left; /* Alinea el texto a la izquierda */
}


/* El efecto dorado suave cuando pasas el dedo o el mouse */
.fila-contacto:hover {
    background: rgba(255, 215, 0, 0.1) !important;
}

#cuerpo-modal-lista {
    flex-grow: 1; /* Estira este div para llenar el vacío */
    overflow-y: auto; /* Permite scroll si hay muchos contactos */
    background: transparent; 
}

/* Animaciones */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Las reglas de las animaciones (van afuera de las llaves) */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

    opacity: 0.6;            /* Se pone un poco transparente al presionarlo */

// --- 2. MOTOR DE PERSISTENCIA (IndexedDB) ---
const dbNombre = "DropisDB";
const dbVersion = 1;

function abrirDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbNombre, dbVersion);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('mensajes')) db.createObjectStore('mensajes', { autoIncrement: true });
            if (!db.objectStoreNames.contains('usuario')) db.createObjectStore('usuario', { keyPath: 'id' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject("Error DB");
    });
}

async function guardarLocal(tabla, datos) {
    const db = await abrirDB();
    const tx = db.transaction(tabla, 'readwrite');
    tx.objectStore(tabla).put(datos);
}

            <div class="msg-info">
                <span class="tiempo">17:33</span><span class="checks" style="color: #4fc3f7;">${checkIcon}</span>
        
            </div>
        `;
        
        chatBox.appendChild(div);
    });
    
    // Auto-scroll al último mensaje
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Variable para la foto nueva
let miFotoBase64 = ""; 

function alternarVistaPerfil() {
    const seccion = document.getElementById('seccion-mi-perfil');
    if (seccion.style.display === "none") {
        seccion.style.display = "block";
        // Rellenar con datos actuales
        document.getElementById('mi-nuevo-nombre').value = localStorage.getItem('mi_nombre') || "";
        document.getElementById('mi-nuevo-estado').value = localStorage.getItem('mi_estado') || "";
        const foto = localStorage.getItem('mi_foto');
        if(foto) {
            document.getElementById('mi-foto-previa').src = foto;
            document.getElementById('mi-foto-previa').style.display = "block";
            document.getElementById('mi-placeholder-foto').style.display = "none";
        }
    } else {
        seccion.style.display = "none";
    }
}

function previsualizarMiFoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            miFotoBase64 = e.target.result;
            document.getElementById('mi-foto-previa').src = miFotoBase64;
            document.getElementById('mi-foto-previa').style.display = "block";
            document.getElementById('mi-placeholder-foto').style.display = "none";
        };
        reader.readAsDataURL(input.files[0]);
    }
}

async function guardarCambiosPerfil() {
    const miID = localStorage.getItem('mi_dropis_id');
    const nom = document.getElementById('mi-nuevo-nombre').value.trim();
    const est = document.getElementById('mi-nuevo-estado').value.trim();
    const fotoParaGuardar = miFotoBase64 || localStorage.getItem('mi_foto') || "";

    if (!nom) return alert("¡El nombre no puede estar vacío!");

    try {
        // 1. Guardar en Firebase
        await db.ref('usuarios/' + miID).update({
            nombre: nom,
            estado: est,
            foto: fotoParaGuardar
        });

        // 2. Actualizar LocalStorage
        localStorage.setItem('mi_nombre', nom);
        localStorage.setItem('mi_estado', est);
        localStorage.setItem('mi_foto', fotoParaGuardar);

        alert("✅ Perfil actualizado");
        alternarVistaPerfil(); // Cerramos la edición
    } catch(e) {
        console.error(e);
        alert("Error al guardar cambios");
    }
}

async function eliminarChatEspecifico() {
    // 1. Obtenemos el ID del contacto que está cargado actualmente en tu input oculto
    const idDestino = document.querySelector('#target-id').value;
    const nombreDestino = document.getElementById('nombre-dueño-header')?.innerText || "este contacto";

    if (!idDestino) return alert("No hay un chat seleccionado para eliminar");

    if (confirm(`¿Eliminar todos los mensajes con ${nombreDestino}?`)) {
        
        // 2. ELIMINACIÓN EN LOCALSTORAGE (Donde lo guardas actualmente)
        const claveChat = 'chat_' + idDestino;
        localStorage.removeItem(claveChat);

        // 3. ELIMINACIÓN EN INDEXEDDB (Para tu nueva estructura DropisDB)
        // Usamos la lógica de borrar que definimos antes
        const db = await abrirDB();
        const tx = db.transaction('mensajes', 'readwrite');
        const store = tx.objectStore('mensajes');
        
        // Borramos usando el prefijo y el ID único
        store.delete('msg_' + idDestino);

        // 4. LIMPIEZA VISUAL
        const box = document.getElementById('chat-box');
        if (box) box.innerHTML = ""; 

        // 5. REFRESCAR AGENDA
        // Esto quita contadores de mensajes no leídos si los hubiera
        localStorage.setItem('unread_' + idDestino, 0);
        pintarAgendaContactos();

        // 6. CERRAR MODAL (Si el botón estaba dentro del perfil)
        const modalPerfil = document.getElementById('modal-perfil');
        if (modalPerfil) modalPerfil.style.display = 'none';

        console.log("✅ Chat borrado con éxito para ID: " + idDestino);
    }
}

async function eliminarContactoDeAgenda() {
    // 1. Obtenemos el ID del contacto que está cargado en el input oculto
    const idABorrar = document.querySelector('#target-id').value;
    const nombreABorrar = document.getElementById('perfil-nombre')?.innerText || "este contacto";

    if (!idABorrar) return;

    if (confirm(`¿Eliminar a ${nombreABorrar} de tu agenda? (Los mensajes se conservarán)`)) {
        
        // 2. Traemos la lista actual
        let contactos = JSON.parse(localStorage.getItem('mis_contactos')) || [];

        // 3. Filtramos la lista para quitar a ese ID
        contactos = contactos.filter(c => c.id !== idABorrar);

        // 4. Guardamos la nueva lista limpia
        localStorage.setItem('mis_contactos', JSON.stringify(contactos));

        // 5. Refrescamos la lista visual en el modal de la agenda
        pintarAgendaContactos();

        // 6. Cerramos los modales
        document.getElementById('modal-perfil').style.display = 'none';
        cerrarModalQR(); // Para volver al chat principal

        alert(`${nombreABorrar} ha sido eliminado de tu agenda.`);
    }
}

if (window.visualViewport) {
    const vv = window.visualViewport;

    const ajustarInterfaz = () => {
        // 1. Forzamos la altura exacta
        document.body.style.height = `${vv.height}px`;

        // 2. Corregimos el desplazamiento del body
        document.body.style.top = `${vv.offsetTop}px`;

        window.scrollTo(0, 0);

        const chatBox = document.getElementById('chat-box');
        if (chatBox) {
            requestAnimationFrame(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    };

    // Faltaban estas líneas y cerrar las llaves:
    vv.addEventListener('resize', ajustarInterfaz);
    vv.addEventListener('scroll', ajustarInterfaz);
    ajustarInterfaz(); // Ejecución inicial
} // <--- Aquí se cierra el IF

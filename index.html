    <style>
   
    * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

    
body {
    font-family: sans-serif;
    background-color: #000000;
    /* Usamos la imagen aquí para que sea global */
    
    background-attachment: fixed; /* LA CLAVE: El fondo no se mueve con el scroll */
    background-position: center;
    background-size: contain;
    background-repeat: no-repeat;
    margin: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
  

  
    left: 0;
    height: 100vh;
    height: 100svh; /* Altura segura para móviles */
    overflow: hidden;
    position: fixed; /* Evita que el navegador desplace toda la pantalla */
}

#chat-box {
   background: transparent !important;
    flex: 1;
    flex-shrink: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: 120px !important;
    display: none;
    flex-direction: column;
    gap: 4px;
    position: relative; /* Necesario para el fondo */
    background: #0b141a; /* Color base oscuro */
    background-image: url('./assets/tu-foto-de-goku.jpg'); 

  
    touch-action: pan-y; /* Permite scroll solo de arriba a abajo */
    -webkit-overflow-scrolling: touch;
    
    /* ... tus estilos ... */
    mask-image: linear-gradient(to bottom, black 85%, transparent 95%);
    -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 95%);

    
} 
    
        .fondo-estatico {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    /* Tu imagen aquí */
    background-image: linear-gradient(rgba(11, 20, 26, 0.7), rgba(11, 20, 26, 0.7)), 
                      url('./assets/logo.webp');
    background-repeat: no-repeat;
    background-position: center;
    
    /* USA PX AQUÍ PARA QUE SEA IMPOSIBLE QUE CREZCA */
    background-size:contain; 
    
    /* Esto lo manda al fondo de todo */
    z-index: -1; 
    pointer-events: none;
        }
     

/* --- INPUT AREA --- */

.contenedor-flotante {
    position: absolute; /* Se queda pegado a la pantalla, no al chat */
    bottom: 0;
    left: 0;
    width: 100%;
    display: flex;
    align-items: flex-end;
    padding: 10px;
    gap: 8px;
    z-index: 100;
    pointer-events: auto; /* IMPORTANTE: Para que puedas hacer clic en el input */
    
    /* Efecto para que parezca que la foto sigue debajo */
    background: rgba(0, 0, 0, 0.1); 
    backdrop-filter: blur(5px); /* Opcional: desenfoca un poco para legibilidad */
    -webkit-backdrop-filter: blur(5px);
}



     
/* --- HEADER ESTILO WHATSAPP --- */
.header { 
    background: rgba(32, 44, 51, 0.7); /* Bajamos de 0.9 a 0.7 para que sea más claro */
   
 padding: 0 15px;    
    display: flex;
    align-items: center;
    flex-shrink: 0; 
    height: 60px;



 
    z-index: 10;
    position: relative;
 /* LA MAGIA DEL CRISTAL */
    backdrop-filter: blur(15px); 
    -webkit-backdrop-filter: blur(10px); /* OBLIGATORIO para iPhone y muchos Android */
}



.header-content {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
}

.foto-perfil {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    background-color: #555;
}

.user-info {
    display: flex;
    flex-direction: column;
}

#nombre-dueño-header {
 background: rgba(26, 26, 26, 0.7); 
    font-size: 16px;
    font-weight: 500;
    margin: 0;
    color: white;
    line-height: 1.2;
     backdrop-filter: blur(10px); 
    -webkit-backdrop-filter: blur(10px);
}
    
.user-status {
    font-size: 12px;
    color: #8696a0;
    margin-top: 2px;
}

#msg-text {
    flex: 1;
    background: rgba(32, 44, 51, 0.9); /* Un gris oscuro con transparencia */
    backdrop-filter: blur(10px);        /* Efecto cristal */
    border-radius: 25px;
    padding: 12px 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    height: 50px;
    max-height: 120px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3); /* Sombrita para que flote */
}

#btn-enviar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #ffd700; /* Dorado sólido o con glass */
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* Efecto cuando pasas el dedo o el mouse */
button#btn-enviar:active {
    background: rgba(255, 215, 0, 0.6); /* Se oscurece un poco al tocarlo */
    transform: scale(0.9);
}

.msg-burbuja { 
    max-width: 85%; 
    width: fit-content; 
    padding: 8px 10px 6px 10px; 
    border-radius: 15px; 
    font-size: 15px; 
    
    position: relative; 
    word-wrap: break-word; 
    margin-bottom: 2px;
    display: inline-block; /* <--- CAMBIA flex por block */
    line-height: 1.2;

}





.msg-info {
    
    
    display: flex;
    align-items: center;
    white-space: nowrap;

    float: right; /* <--- Esto la manda a la derecha del texto */
    font-size: 10px;
    opacity: 0.7;
    margin-top:8px; /* Ajusta para que baje un poquito y quede a nivel de la última línea */
    margin-left: 10px; /* Separación del texto */
    gap: 3px;

}        
 
.msg-derecha { 
    align-self: flex-end; 
    background: linear-gradient(135deg, rgba(0, 92, 75, 0.8) 0%, rgba(0, 77, 64, 0.8) 100%); 
    color: #ffffff; 
    border-bottom-right-radius: 15px; 
    border-top-right-radius: 2px;
}

.msg-izquierda { 
    align-self: flex-start; 
    background: rgba(32, 44, 51, 0.8); 
    color: #ffffff; 
    border-bottom-left-radius: 20px; 
    
     border-top-left-radius: 2px;
}

/* Si el mensaje de la izquierda va seguido de otro de la izquierda */
.msg-izquierda + .msg-izquierda {
    border-top-left-radius: 4px; /* Hace que la esquina de arriba sea más cuadrada */
}

/* Si el mensaje de la derecha va seguido de otro de la derecha */
.msg-derecha + .msg-derecha {
    border-top-right-radius: 4px;
}




.menu-mensaje div {
    padding: 10px 20px;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

.menu-mensaje div:hover {
    background: #3b4a54;
}
        
        #mi-id-display { font-size: 11px; color: #ffd700; margin-top: 5px; font-family: monospace; }
        .btn-qr-dropis { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: #ffd700; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 18px; }
        
        /* MODALES */
        /* 1. EL CONTENEDOR (Ocupa toda la pantalla) */
/* 1. EL FONDO NEGRO DETRÁS DEL MODAL */
/* EL MODAL: Usa 'dvh' para que ignore el teclado y no se encoja */
.modal {
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: #000000;
    
    z-index: 1000; 
    transition: all 0.5s ease;
}


     
/* 2. EL CONTENIDO (Pantalla Completa con Fondo) */
.modal-content { 
    background-color: #0b141a;
    /* Aplicamos el fondo con el logo igual que en tu chat */
    background-image: linear-gradient(rgba(11, 20, 26, 0.9), rgba(11, 20, 26, 0.9)), 
                      url('./assets/logo.webp');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    
    width: 100%; 
    
    display: flex;
    
    flex-direction: column; /* Esto permite que el header esté arriba y el botón abajo */
    color: white; 
    animation: fadeIn 0.4s ease; 
    
    height: 100dvh; /* Usa el alto dinámico para móviles */
margin: 0;
    
    /* Agrega estas dos líneas: */
    overflow: hidden;
    justify-content: space-between;
}
/* 3. LAS FILAS DE CONTACTOS (Estilo WhatsApp) */
.fila-contacto {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px;
    cursor: pointer;
    background: rgba(32, 44, 51, 0.1); /* Fondo semi-transparente para ver el logo atrás */
    
    transition: background 0.3s ease;
    text-align: left; /* Alinea el texto a la izquierda */
}


/* El efecto dorado suave cuando pasas el dedo o el mouse */
.fila-contacto:hover {
    background: rgba(255, 215, 0, 0.1) !important;
}

#cuerpo-modal-lista {
    flex-grow: 1; /* Estira este div para llenar el vacío */
    overflow-y: auto; /* Permite scroll si hay muchos contactos */
    background: transparent; 
}
     


/* Animaciones */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Las reglas de las animaciones (van afuera de las llaves) */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

                /* Estilo para el botón dentro de la barra amarilla */

   /* Cambiamos el nombre a .btn-modal-contacto para que no choque con el otro */
.btn-modal-contacto { 
    position:absolute;
    top: 70px;            
    right: 20px;          
    background: #ffd700; 
    border: none; 
    border-radius: 50%; 
    width: 45px; 
    height: 45px; 
    cursor: pointer; 
    font-size: 20px;

    display: flex;
    align-items: center;
    justify-content: center;
}

#cuerpo-modal-lista {
    padding-bottom: 100px !important; /* Espacio extra para que la barra no tape nada */
}
     
.contador-nube {
    background:  #ffd700; /* Verde tipo WhatsApp */
    color: white;
    border-radius: 50%;
    padding: 2px 7px;
    font-size: 12px;
    font-weight: bold;
    min-width: 15px;
    text-align: center;
    margin-left: auto; /* Lo empuja a la derecha */
}
.btn-back-clean {
    background: transparent; /* Quita el color de fondo */
    border: none;            /* Quita el borde */
    outline: none;           /* Quita el borde de enfoque al hacer clic */
    color: white;            /* Color de la flechita */
    font-size: 20px;         /* Tamaño de la flecha */
    padding: 5px;           /* Espacio para que sea fácil de tocar con el dedo */
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
#nombre-dueño-header-lista {
    /* Mantiene tu color pero le da el efecto blur */
    backdrop-filter: blur(15px) !important;
    -webkit-backdrop-filter: blur(15px) !important;
    
    /* Esto asegura que se quede pegado arriba si no lo estaba */
    position: sticky;
    top: 0;
    z-index: 1000;
}

     .barra-flotante-premium {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 450px;
    
    background: rgba(32, 44, 51, 0.8);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    /* Cambiamos a FLEX para los botones */
    display: flex;
    justify-content: space-around; /* Reparte los botones con espacio igual */
    align-items: center;
    
    padding: 10px 5px;
    border-radius: 25px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    z-index: 9999;
}

/* Estilo para los botones individuales dentro de la barra */
.btn-nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #8696a0; /* Color gris suave para los no seleccionados */
    text-decoration: none;
    font-size: 11px;
    font-weight: 500;
    flex: 1;
    cursor: pointer;
    transition: 0.3s;
}

/* El botón que esté activo o cuando lo toques */
.btn-nav.active, .btn-nav:active {
    color: #ffd700; /* Dorado para resaltar */
}

.btn-nav i {
    font-size: 20px; /* Tamaño para los iconos */
    margin-bottom: 4px;
}
/* Efecto opcional al tocarlo */
.btn-back-clean:active {
    opacity: 0.6;            /* Se pone un poco transparente al presionarlo */
}
     /* Esto es para que los iconos (cámara/clip) no se peguen al techo del contenedor */
/* Esto NO toca tu fondo de Goku ni tu scroll */
label[for="file-input"] {
    display: inline-block;
    width: 40px;
    height: 40px;
    line-height: 40px; /* Alinea el icono verticalmente */
    text-align: center;
    flex-shrink: 0; /* Prohibido que se encoja o crezca */
    margin: 0;
}

.fa-camera {
    color: #8696a0;
    font-size: 20px;
    cursor: pointer;
    transition: color 0.2s;
}

.fa-camera:active {
    color: #ffd700; /* Se pone dorado solo cuando lo tocas */
}
       /* Un estilo limpio para que la foto siempre se vea */
/* Solo afecta a estos dos elementos, no toca las fotos del chat */
#foto-perfil-header, #mi-foto-previa {
    width: 45px !important;
    height: 45px !important;
    border-radius: 50% !important;
    object-fit: cover !important;
    border: 2px solid #ffd700 !important;
    flex-shrink: 0; /* Evita que se aplaste si el nombre es largo */
     } 
    </style>

const dbNombre = "DropisDB";
const dbVersion = 1;

function abrirDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbNombre, dbVersion);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('mensajes')) db.createObjectStore('mensajes', { autoIncrement: true });
            if (!db.objectStoreNames.contains('usuario')) db.createObjectStore('usuario', { keyPath: 'id' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject("Error DB");
    });
}

async function guardarLocal(tabla, datos) {
    const db = await abrirDB();
    const tx = db.transaction(tabla, 'readwrite');
    tx.objectStore(tabla).put(datos);
}

  async function activarAntena() {
    const miID = localStorage.getItem('mi_dropis_id');
    if (!miID) return;

    if (window.listenerActivo) window.listenerActivo.off(); 

    window.listenerActivo = db.ref('cola_satelital/' + miID);
    
    window.listenerActivo.on('child_added', async (snapshot) => {
        const data = snapshot.val();
        if (!data || !data.p) return; 

        try {
            const root = await cargarProto();
            const SuperAppPayload = root.lookupType("SuperAppPayload");
            const buffer = Uint8Array.from(atob(data.p), c => c.charCodeAt(0));
            const decoded = SuperAppPayload.decode(buffer);

            const emisorID = data.from; 
            const chatAbiertoActualmente = document.querySelector('#target-id').value;

            // --- 1. LÓGICA DE CONFIRMACIÓN (DOBLE CHECK) ---
            if (decoded.tipo === 1) { 
                // Si el tipo es 1, es un "Eco". No pintamos nada, solo marcamos el check.
                if (typeof marcarMensajeComoRecibido === "function") {
                    marcarMensajeComoRecibido(decoded.msgId, emisorID);
                }
                snapshot.ref.remove(); 
                return; // Salimos para no procesar como mensaje de texto
            }

            // --- 2. LÓGICA DE MENSAJE DE TEXTO (TIPO 0) ---
            const textoReal = decodeURIComponent(escape(atob(decoded.chatText)));

            // Guardar mensaje en el historial local (Incluyendo el msgId)
            let clave = 'chat_' + emisorID;
            

           let historial = JSON.parse(localStorage.getItem(clave)) || [];
            historial.push({ 
                id: decoded.msgId, // Guardamos el ID para futuras referencias
                texto: textoReal, 
                clase: 'msg-izquierda',
                ts: Date.now(),

                hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true })
            });
           
            localStorage.setItem(clave, JSON.stringify(historial));

            // Manejo de Interfaz y Notificaciones
            if (emisorID === chatAbiertoActualmente) {
                // Pasamos el msgId a pintarMensaje para que el HTML sea rastreable
                pintarMensaje(textoReal, 'msg-izquierda',null, 'enviado', decoded.msgId);
         
        } else {
                let noLeidos = parseInt(localStorage.getItem('unread_' + emisorID)) || 0;
                localStorage.setItem('unread_' + emisorID, noLeidos + 1);
                
                pintarAgendaContactos();

                // Notificación Nativa corregida
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.ready.then(registration => {
                        registration.showNotification("SpaceChat: " + emisorID, {
                            body: textoReal,
                            icon: 'https://cdn-icons-png.flaticon.com/512/733/733585.png',
                            vibrate: [200, 100, 200],
                            tag: 'nuevo-mensaje-' + emisorID, 
                            renotify: true,
                            data: { emisor: emisorID }
                        });
                    });
                }
            }

            // --- 3. ENVIAR ECO AUTOMÁTICO AL EMISOR ---
            // Le avisamos al otro que ya recibimos su mensaje
            if (typeof enviarEco === "function") {
                enviarEco(decoded.msgId, emisorID);
            }

            snapshot.ref.remove(); 
        } catch (e) { console.error("Error en Antena:", e); }
    });
     }
       
        
async function enviarMensajeSatelital() {
    const inputMsg = document.querySelector('#msg-text');
    const inputTarget = document.querySelector('#target-id');
    const msg = inputMsg ? inputMsg.value.trim() : "";
    const targetID = inputTarget ? inputTarget.value.trim() : "";
    const miID = localStorage.getItem('mi_dropis_id') || "ID_DESCONOCIDO";

    if (!targetID || !msg) return alert("ID y Mensaje son obligatorios");

    // 1. GENERAMOS EL ID ÚNICO (La "cédula" del mensaje)
    const msgId = "msg_" + Date.now();

    try {
        // 2. MOTOR PROTOBUF
        const root = await cargarProto();
        const SuperAppPayload = root.lookupType("SuperAppPayload");
        
        // Ofuscamos el mensaje (Base64 + URI Encode)
        const msgProtegido = btoa(unescape(encodeURIComponent(msg))); 
        
        // Creamos el paquete incluyendo el ID único
        const payload = SuperAppPayload.create({ 
            chatText: msgProtegido,
            msgId: msgId,
            type: 0 // 0 significa que es un mensaje de texto normal
});
        
        
        const buffer = SuperAppPayload.encode(payload).finish();
        
        // 3. CONVERSIÓN Y LANZAMIENTO
        const base64 = btoa(String.fromCharCode.apply(null, buffer));
        
        await db.ref('cola_satelital/' + targetID).push({
            p: base64,         // Paquete ProtoBuf
            from: miID,        // Remitente
            ts: Date.now(),    // Timestamp
            mId: msgId         // ID para rastreo de Doble Check
        });

        // 4. INTERFAZ Y PERSISTENCIA LOCAL
        // Pintamos el mensaje pasando el msgId para el futuro Doble Check
        pintarMensaje(msg, 'msg-derecha', null, 'enviado', msgId);
        // Guardamos en el historial con toda la data necesaria
        let historialEnv = JSON.parse(localStorage.getItem('chat_' + targetID)) || [];
        historialEnv.push({ 
            id: msgId, 
            texto: msg, 
            clase: 'msg-derecha', 
            status: 'enviado',
            ts: Date.now(),
            // AGREGA ESTA LÍNEA JUSTO AQUÍ:
            hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true })
});
        localStorage.setItem('chat_' + targetID, JSON.stringify(historialEnv));

        // 5. LIMPIEZA DE INPUT (Manteniendo el foco y reseteando altura)
        if (inputMsg) {
            inputMsg.value = "";
            inputMsg.style.height = '36px'; // Mantiene tu diseño visual
            inputMsg.focus(); 
        }

        console.log("🚀 Mensaje con ID " + msgId + " lanzado al espacio hacia:", targetID);

    } catch (e) {
        console.error("❌ Fallo en el lanzamiento:", e);
        alert("Error al enviar el mensaje.");
    }
     }

async function cargarProto() {
    const schema = `
        package superapp;
        syntax = "proto3";
        message SuperAppPayload {
            string chatText = 1;
            string msgId = 2;
            uint32 tipo = 3;
            bytes archivoData = 4;

        }
    `;
    const root = protobuf.parse(schema).root;
    return root;
     }

// Variable necesaria para que el menú sepa a qué mensaje le diste clic
let mensajeSeleccionado = null;
 
 function pintarMensaje(texto, clase, hora = null, estado = 'enviado', msgId = null) {
    const box = document.getElementById('chat-box');
    if (!box) return;

    const div = document.createElement('div');
    div.className = 'msg-burbuja ' + clase;
    
    // 1. Identificador único para el Doble Check
    if (msgId) div.id = 'msg-' + msgId; 

    const tiempo = hora || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
    
    // 2. Lógica de checks (Gris si es enviado, Azul si es recibido)
    let checkHTML = "";
    if (clase.includes('derecha')) {
        const color = (estado === 'recibido') ? '#34B7F1' : '#8696a0';
        const icon = (estado === 'recibido') ? '✓✓' : '✓';
        checkHTML = `<span class="checks" style="color: ${color}; margin-left: 5px; font-weight: bold;">${icon}</span>`;
    }

    // 3. FILTRO DE CONTENIDO: ¿Es foto, respuesta o texto normal?
    let contenidoFinal = "";

    if (texto.startsWith('http') && (texto.includes('firebasestorage') || texto.includes('.jpg') || texto.includes('.png'))) {
        // Es una FOTO
        contenidoFinal = `<img src="${texto}" style="max-width:250px; border-radius:10px; display:block; margin-bottom:5px; cursor:pointer;" onclick="window.open('${texto}')">`;
    } else if (texto && texto.includes("Resp >")) {
        // Es una RESPUESTA (Cita)
        const partes = texto.split("\n— ");
        const cabezalCita = partes[0].replace("Resp >", "").trim();
        const mensajeReal = partes[1] || "";
        contenidoFinal = `
            <div style="font-size: 11px; opacity: 0.6; border-left: 3px solid #ffd700; padding-left: 5px; margin-bottom: 5px; font-style: italic;">
                Resp: ${cabezalCita}
            </div>
            <div>${mensajeReal}</div>
        `;
    } else {
        // Es TEXTO NORMAL
        contenidoFinal = `<span>${texto}</span>`;
    }

    // 4. Armamos el HTML final
    div.innerHTML = `${contenidoFinal} <span class="msg-info" style="font-size: 10px; opacity: 0.7; display: block; text-align: right; margin-top: 3px;">${tiempo}${checkHTML}</span>`;

    // 5. Menú de acciones (Borrar, Editar, etc.)
    div.onclick = (e) => {
        mensajeSeleccionado = div; 
        const menu = document.getElementById('menu-acciones');
        if(menu) {
            menu.style.display = 'block';
            menu.style.top = e.pageY + "px";
            menu.style.left = (e.pageX > 200 ? e.pageX - 150 : e.pageX) + "px";
        }
        e.stopPropagation(); 
    };

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
     }

function accionMensaje(tipo) {
    if (!mensajeSeleccionado) return;
    
    const textoOriginal = mensajeSeleccionado.innerText;
    const inputMsg = document.querySelector('#msg-text');
    const inputTarget = document.querySelector('#target-id');
 
    // --- EL CEREBRO PARA SUBIR LA CITA ---
    if (tipo === 'responder') {
    // Buscamos solo el div del mensaje, ignorando el de la hora (msg-info)
    const corpo = mensajeSeleccionado.querySelector('div:first-child');
    let cita = corpo ? corpo.innerText : mensajeSeleccionado.innerText;
    
    // Limpiamos si la cita es muy larga para que no haga la burbuja gigante
    if(cita.length > 50) cita = cita.substring(0, 50) + "...";

    inputMsg.value = `Resp > ${cita.trim()}\n— `;
    inputMsg.focus();
    }
        
    else if (tipo === 'editar') {
        inputMsg.value = textoOriginal;
        // Al editar, borramos el viejo para sobreescribir
        borrarMensajeDeMemoria(textoOriginal);
        mensajeSeleccionado.remove();
        inputMsg.focus();
    } 
    else if (tipo === 'copiar-id') {
        if(inputTarget) {
            inputTarget.value = textoOriginal.trim();
            inputTarget.style.boxShadow = "0 0 10px #ffd700";
            setTimeout(() => inputTarget.style.boxShadow = "none", 1000);
        }
    } 
    else if (tipo === 'borrar') {
        if(confirm("¿Borrar mensaje para siempre?")) {
            borrarMensajeDeMemoria(textoOriginal);
            mensajeSeleccionado.remove();
        }
    }
 
    document.getElementById('menu-acciones').style.display = 'none';
}

     let instaladorDiferido;

window.addEventListener('beforeinstallprompt', (e) => {
    // Evita que Chrome muestre el aviso automático feo
    e.preventDefault();
    // Guarda el evento para usarlo cuando tú quieras
    instaladorDiferido = e;
    
    // OPCIONAL: Aquí podrías mostrar un botón que diga "DESCARGAR SPACECHAT"
    // O lanzarlo de una vez si quieres ser agresivo como en Netlify:
    setTimeout(() => {
        lanzarInstalacion();
    }, 2000); // Espera 2 segundos para que el usuario vea la app primero
});

function lanzarInstalacion() {
    if (instaladorDiferido) {
        instaladorDiferido.prompt();
        instaladorDiferido.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('¡El usuario aceptó la descarga!');
            }
            instaladorDiferido = null;
        });
    }
     }
if (window.visualViewport) {
    const vv = window.visualViewport;
    const ajustarInterfaz = () => {
        document.body.style.height = `${vv.height}px`;
        document.body.style.top = `${vv.offsetTop}px`;
        window.scrollTo(0, 0);
        const chatBox = document.getElementById('chat-box');
        if (chatBox) {
            requestAnimationFrame(() => { chatBox.scrollTop = chatBox.scrollHeight; });
        }
    };
    vv.addEventListener('resize', ajustarInterfaz);
    vv.addEventListener('scroll', ajustarInterfaz);
    ajustarInterfaz();
     }

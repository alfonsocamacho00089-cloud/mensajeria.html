<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dropis Message Lite 🛰️</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.4/dist/protobuf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        body { font-family: sans-serif; background: #000000; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 2px solid #ffd700; flex-shrink: 0; position: relative; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .input-area { background: #1a1a1a; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #333; flex-shrink: 0; padding-bottom: 25px; }
        input#msg-text { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; background: #2a2a2a; color: white; }
        input#target-id { width: 70px; background: #000; color: #ffd700; border: 1px solid #333; border-radius: 8px; text-align: center; }
        button#btn-enviar { background: #ffd700; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; }
        .msg-burbuja { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; margin: 2px 0; color: white; }
        .msg-derecha { align-self: flex-end; background-color: #005c4b; border-bottom-right-radius: 2px; }
        .msg-izquierda { align-self: flex-start; background-color: #202c33; border-bottom-left-radius: 2px; }
        .msg-burbuja[data-enviado="3"]::after { content: " ✓✓"; font-size: 10px; color: #34b7f1; }
        #mi-id-display { font-size: 11px; color: #ffd700; margin-top: 5px; font-family: monospace; }
        .btn-qr-dropis { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: #ffd700; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; color: #333; }
    </style>
</head>
<body>

    <div class="header">
        DROPSIS CHAT LITE 🛰️
        <div id="mi-id-display">Cargando identidad...</div>
        <button class="btn-qr-dropis" onclick="manejarBotonIdentidad()">🪪</button>
    </div>

    <div id="chat-box"></div>

    <div id="modal-registro" class="modal">
        <div class="modal-content">
            <h3>Registro Maestro</h3>
            <input type="text" id="reg-nombre" placeholder="Nombre" style="width:90%; padding:10px; margin:5px 0;">
            <input type="text" id="reg-apellido" placeholder="Apellido" style="width:90%; padding:10px; margin:5px 0;">
            <button onclick="ejecutarRegistroCompleto()" style="width: 100%; padding: 12px; background: #ffd700; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px;">VALIDAR Y CREAR</button>
            <p style="margin-top: 20px; font-size: 13px; color: #666; cursor: pointer; text-decoration: underline;" onclick="recuperarCuentaConID()">¿Ya tienes un ID? Toca aquí</p>
        </div>
    </div>

    <div id="modal-huella" class="modal">
        <div class="modal-content" style="background: #000; color: #ffd700; border: 2px solid #ffd700;">
            <div style="font-size: 60px; margin-bottom: 15px;">🫆</div>
            <h3>Sincronizando...</h3>
        </div>
    </div>

    <div id="modal-qr" class="modal">
        <div class="modal-content">
            <h3>Mi Identidad</h3>
            <div id="contenedor-qr"></div>
            <button onclick="cerrarModalQR()" style="margin-top: 20px; width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 10px;">CERRAR</button>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="target-id" placeholder="ID">
        <input type="text" id="msg-text" placeholder="Escribe un mensaje...">
        <button id="btn-enviar" onclick="enviarMensajeSatelital()">ENVIAR</button>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCaUyhX2iBMl4A5xeKeu4SeE6HClp4V1s",
            authDomain: "real-market-elite-2025.firebaseapp.com",
            projectId: "real-market-elite-2025",
            databaseURL: "https://real-market-elite-2025-default-rtdb.firebaseio.com",
            messagingSenderId: "226489002778",
            appId: "1:226489002778:web:6722d21a9e78b33b5b1aa3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const messaging = firebase.messaging();

        // MOTOR DE BASE DE DATOS LOCAL
        async function abrirDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open("DropisDB", 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('mensajes')) db.createObjectStore('mensajes', { autoIncrement: true });
                    if (!db.objectStoreNames.contains('usuario')) db.createObjectStore('usuario', { keyPath: 'id' });
                };
                request.onsuccess = () => resolve(request.result);
            });
        }

        async function guardarLocal(tabla, datos) {
            const dbL = await abrirDB();
            const tx = dbL.transaction(tabla, 'readwrite');
            tx.objectStore(tabla).put(datos);
        }

        // ESQUEMA PROTOBUF INTEGRADO
        async function cargarProto() {
            const schema = `
                package superapp;
                syntax = "proto3";
                message SuperAppPayload {
                    string chatText = 1;
                }
            `;
            return protobuf.parse(schema).root;
        }

        // ANTENA: RECIBIR MENSAJES
        async function activarAntena() {
            const miID = localStorage.getItem('mi_dropis_id');
            if (!miID) return;

            console.log("📡 Antena activa en:", miID);
            const ref = db.ref('cola_satelital/' + miID);
            
            ref.on('child_added', async (snapshot) => {
                const data = snapshot.val();
                if (!data || !data.p) return;

                try {
                    const root = await cargarProto();
                    const SuperAppPayload = root.lookupType("SuperAppPayload");
                    const buffer = Uint8Array.from(atob(data.p), c => c.charCodeAt(0));
                    const decoded = SuperAppPayload.decode(buffer);

                    pintarMensaje(decoded.chatText, 'msg-izquierda');
                    guardarLocal('mensajes', { texto: decoded.chatText, from: data.from, ts: Date.now() });
                    snapshot.ref.remove(); 
                } catch (e) {
                    console.error("Error decodificando:", e);
                }
            });
        }

        // EMISOR: ENVIAR MENSAJES
        async function enviarMensajeSatelital() {
            const targetID = document.getElementById('target-id').value.trim();
            const msgInput = document.getElementById('msg-text');
            const msg = msgInput.value.trim();
            const miID = localStorage.getItem('mi_dropis_id');

            if (!targetID || !msg) return;

            try {
                const root = await cargarProto();
                const SuperAppPayload = root.lookupType("SuperAppPayload");
                const payload = SuperAppPayload.create({ chatText: msg });
                const buffer = SuperAppPayload.encode(payload).finish();
                const base64 = btoa(String.fromCharCode(...buffer));

                await db.ref('cola_satelital/' + targetID).push({
                    p: base64,
                    from: miID,
                    ts: Date.now()
                });

                pintarMensaje(msg, 'msg-derecha');
                msgInput.value = "";
            } catch (e) {
                console.error("Error al enviar:", e);
            }
        }

        function pintarMensaje(texto, clase) {
            const box = document.getElementById('chat-box');
            if (!box) return;
            const div = document.createElement('div');
            div.className = 'msg-burbuja ' + clase;
            div.innerText = texto;
            if (clase === 'msg-derecha') div.setAttribute('data-enviado', '3');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // REGISTRO Y LOGIN
        async function ejecutarRegistroCompleto() {
            const nombre = document.getElementById('reg-nombre').value.trim();
            const apellido = document.getElementById('reg-apellido').value.trim();
            if (!nombre || !apellido) return alert("Faltan datos");

            const idUnico = Math.random().toString(36).substring(2, 10);
            localStorage.setItem('mi_dropis_id', idUnico);
            
            await db.ref('usuarios/' + idUnico).set({ nombre, apellido, id_sistema: idUnico });
            document.getElementById('modal-registro').style.display = 'none';
            location.reload();
        }

        async function recuperarCuentaConID() {
            const id = prompt("Ingresa tu ID:");
            if (!id) return;
            const snap = await db.ref('usuarios/' + id).once('value');
            if (snap.exists()) {
                localStorage.setItem('mi_dropis_id', id);
                location.reload();
            } else {
                alert("ID no encontrado");
            }
        }

        function manejarBotonIdentidad() {
            const id = localStorage.getItem('mi_dropis_id');
            if (!id) return document.getElementById('modal-registro').style.display = 'flex';
            
            document.getElementById('modal-qr').style.display = 'flex';
            const cont = document.getElementById('contenedor-qr');
            cont.innerHTML = "";
            new QRCode(cont, { text: id, width: 150, height: 150 });
        }

        function cerrarModalQR() { document.getElementById('modal-qr').style.display = 'none'; }

        window.onload = () => {
            const id = localStorage.getItem('mi_dropis_id');
            if (id) {
                document.getElementById('mi-id-display').innerText = "Tu ID: " + id;
                activarAntena();
            } else {
                document.getElementById('modal-registro').style.display = 'flex';
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

    <style>

        
        /* Contenedor Rígido */
body { 
    font-family: sans-serif; 
    background: #000000; 
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    height: 100dvh; /* Altura dinámica para móviles */
    overflow: hidden; /* Evita el scroll de toda la pantalla */
}

/* Cabecera Intocable */
.header { 
    background: #1a1a1a; 
    padding: 15px; 
    border-bottom: 2px solid #ffd700; 
    flex-shrink: 0; /* NO se aplasta */
}

/* El Chat es el único que crece y desliza */
#chat-box { 
    flex: 1; 
    overflow-y: auto; 
    padding: 15px; 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
    background: #000;
}

/* Área de Entrada Intocable al fondo */
.input-area { 
    background: #1a1a1a; 
    padding: 15px; 
    display: flex; 
    gap: 10px; 
    border-top: 1px solid #333; 
    flex-shrink: 0; /* NO se aplasta ni desaparece */
    padding-bottom: max(15px, env(safe-area-inset-bottom)); /* Soporte para Notch de móviles */
}

        /* DISEÑO DE SEGURIDAD (BLOQUE 2) - SIN CAMBIOS */
        .msg-burbuja { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.5); margin: 2px 0; }
        .msg-izquierda { background-color: #005c4b; align-self: flex-start; border-left: 5px solid #25d366; color: white; }
        .msg-derecha { background-color: #2a2a2a; align-self: flex-end; border-bottom-right-radius: 2px; color: white; }
        
        /* INPUT AREA CORREGIDA (Siempre visible al fondo) */
        .input-area { 
            background: #1a1a1a; 
            padding: 10px 15px; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #333; 
            flex-shrink: 0; /* Evita que se vaya muy abajo */
            padding-bottom: 20px; /* Espacio para botones de navegación del móvil */
        }

        input#msg-text { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; background: #2a2a2a; color: white; }
        input#target-id { width: 60px; background: #000; color: #ffd700; border: 1px solid #333; border-radius: 8px; text-align: center; }
        
        button#btn-enviar { background: #ffd700; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; }
        
        #mi-id-display { font-size: 11px; color: #ffd700; margin-top: 5px; font-family: monospace; }
        .btn-qr-dropis { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: #ffd700; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 18px; }

        .msg-burbuja[data-enviado="3"]::after { content: " ✓✓"; font-size: 10px; color: #34b7f1; }

        /* MODALES */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; color: #333; }

        
    </style>

</head>
<script>
    // 1. Esta función quita el error de "Not Defined"
    function enviarMensajeSatelital() {
        const id = document.getElementById('target-id').value;
        const msg = document.getElementById('msg-text').value;
        
        if(msg === "") {
            alert("Escribe algo para enviar");
            return;
        }
        
        console.log("Mensaje enviado a: " + id);
        document.getElementById('msg-text').value = ""; // Limpia el cuadro
        }
    
<body>

    <div class="header">
        DROPSIS CHAT LITE 🛰️
        <div id="mi-id-display">Cargando identidad...</div>
        <button class="btn-qr-dropis" onclick="manejarBotonIdentidad()">🪪</button>
    </div>

    <div id="chat-box">
        </div>

    <div id="modal-registro" class="modal">
        <div class="modal-content">
            <h3>Registro Maestro</h3>
            <input type="text" id="reg-nombre" placeholder="Nombre" style="width:100%; padding:10px; margin:5px 0; color:#000;">
            <input type="text" id="reg-apellido" placeholder="Apellido" style="width:100%; padding:10px; margin:5px 0; color:#000;">
            <button onclick="ejecutarRegistroCompleto()" style="width: 100%; padding: 12px; background: #ffd700; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px;">VALIDAR HUELLA Y CREAR</button>
        </div>
    </div>

    <div id="modal-huella" class="modal">
    <div class="modal-content" style="background: #000; color: #ffd700; border: 2px solid #ffd700;">
        <div style="font-size: 60px; margin-bottom: 15px;">🫆</div>
        <h3 style="color: #fff;">Validando Huella...</h3>
        <p style="color: #ffd700; font-family: monospace; font-size: 12px;">Vinculando Token Satelital</p>
    </div>
    </div>
    <div id="modal-qr" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">Mi Identidad Dropis</h3>
            <div id="contenedor-qr" style="display: flex; flex-direction: column; align-items: center;"></div>
            <button onclick="cerrarModalQR()" style="margin-top: 20px; width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 10px;">CERRAR</button>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="target-id" placeholder="ID">
        <input type="text" id="msg-text" placeholder="Escribe un mensaje...">
        <button id="btn-enviar" onclick="enviarMensajeSatelital()">ENVIAR</button>
    </div>

    <script>
        // 1. CONFIGURACIÓN Y REGISTRO DE ANTENA (INDISPENSABLE PARA EL TOKEN)
const firebaseConfig = {
    apiKey: "AIzaSyCaUyhX2iBMl4A5xeKeu_4SeE6HClp4V1s",
    authDomain: "real-market-elite-2025.firebaseapp.com",
    projectId: "real-market-elite-2025",
    databaseURL: "https://real-market-elite-2025-default-rtdb.firebaseio.com",
    messagingSenderId: "226489002778",
    appId: "1:226489002778:web:6722d21a9e78b33b5b1aa3"
};
firebase.initializeApp(firebaseConfig);
const messaging = firebase.messaging();

// Registrar antena apenas cargue para que esté lista al registrarse
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./firebase-messaging-sw.js').catch(e => console.error("Antena no lista"));
}

async function ejecutarRegistroCompleto() {
    const nombre = document.getElementById('reg-nombre').value.trim();
    const apellido = document.getElementById('reg-apellido').value.trim();
    if (!nombre || !apellido) return alert("Completa los datos");

    const idUnico = Math.random().toString(36).substring(2, 14); 
    localStorage.setItem('mi_dropis_id', idUnico);
    
    document.getElementById('modal-registro').style.display = 'none';
    document.getElementById('mi-id-display').innerText = "Tu ID: " + idUnico;
    
    // MOSTRAR MODAL DE HUELLA
    const modalHuella = document.getElementById('modal-huella');
    modalHuella.style.display = 'flex';

    try {
        // Esperar a que la antena esté lista antes de pedir el token
        const registration = await navigator.serviceWorker.ready;
        const token = await messaging.getToken({ 
            vapidKey: 'BIrsA9YbBXfIuo4PTMrKRtuktRsK2RbK0XevupuofGGOUDy9w5VZ9yaXbZXsenXppmFsR62-2B7jBOG0Z8RdxvU',
            serviceWorkerRegistration: registration 
        });
        
        if (token) {
            console.log("🎫 TOKEN:", token);
            localStorage.setItem('fcm_token', token);
        }

        // Dejar el modal de la huella 3 segundos para que de tiempo de verla
        setTimeout(() => { modalHuella.style.display = 'none'; }, 3000);

    } catch (e) { 
        console.warn("Error Token:", e);
        // Si falla, dejamos la huella 2 segundos y cerramos
        setTimeout(() => { modalHuella.style.display = 'none'; }, 2000);
    }
}
    
        function manejarBotonIdentidad() {
            const id = localStorage.getItem('mi_dropis_id');
            if (id) {
                document.getElementById('modal-qr').style.display = 'flex';
                const cont = document.getElementById('contenedor-qr');
                cont.innerHTML = "";
                new QRCode(cont, { text: `dropisapp://perfil/${id}`, width: 180, height: 180 });
                const p = document.createElement("p");
                p.innerText = "ID: " + id;
                p.style.color = "#333";
                cont.appendChild(p);
            } else {
                document.getElementById('modal-registro').style.display = 'flex';
            }
        }

        function cerrarModalQR() { document.getElementById('modal-qr').style.display = 'none'; }

        function activarAntena() {
    const miID = localStorage.getItem('mi_dropis_id') || 'Pedro Peres';
    // Definimos la variable globalmente si no existe
    if (window.listenerActivo) window.listenerActivo.off(); 

    console.log("📡 Antena sintonizada en:", miID);
    window.listenerActivo = firebase.database().ref('cola_satelital/' + miID);
    
    window.listenerActivo.on('child_added', async (snapshot) => {
        const data = snapshot.val();
        console.log("📩 Nuevo dato en cola:", data);
        
        try {
            const root = await cargarProto();
            const SuperAppPayload = root.lookupType("SuperAppPayload");
            
            const buffer = Uint8Array.from(atob(data.p), c => c.charCodeAt(0));
            const decoded = SuperAppPayload.decode(buffer);

            // Pintar el mensaje real que llegó de la nube
            pintarMensaje(decoded.chat_text, 'msg-izquierda');
            
            // Borrar de la nube para no recibirlo mil veces
            snapshot.ref.remove();

        } catch (e) {
            console.error("Error decodificando satélite:", e);
        }
    });
}

function pintarMensaje(texto, clase) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = 'msg-burbuja ' + clase;
    div.innerText = texto;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// 3. INICIO AUTOMÁTICO (ESTO VA AFUERA)
window.onload = () => {
    const id = localStorage.getItem('mi_dropis_id');
    if (!id) {
        document.getElementById('modal-registro').style.display = 'flex';
    } else {
        document.getElementById('mi-id-display').innerText = "Tu ID: " + id;
        activarAntena(); // Sintoniza apenas abre
    }
};
</script>

</body>

</html>

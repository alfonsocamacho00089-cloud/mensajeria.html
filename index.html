<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropis Message Lite 🛰️</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.4/dist/protobuf.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-burbuja { padding: 12px; border-radius: 15px; max-width: 80%; word-wrap: break-word; margin: 5px 0; }
        .msg-izquierda { background: #005c4b; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 5px solid #25d366; }
        .msg-derecha { background: #075e54; align-self: flex-end; border-bottom-right-radius: 2px; }
        .input-area { background: #1e1e1e; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; background: #333; color: white; }
        button { background: #ffeb3b; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; }
        .header { background:#1e1e1e; padding:15px; text-align:center; font-weight:bold; border-bottom: 2px solid #ffeb3b; }
        #mi-id-display { font-size: 10px; color: #aaa; margin-top: 5px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</head>
<body>

    <div class="header">
        DROPSIS CHAT LITE 🛰️
        <div id="mi-id-display">Cargando identidad...</div>
    </div>

    <div id="chat-box">
        </div>

    <div class="input-area">
        <input type="hidden" id="target-id" value="global"> 
        <input type="text" id="msg-text" placeholder="Escribe un mensaje satelital...">
        <button onclick="enviarMensajeSatelital()">ENVIAR</button>
    </div>

    <div id="modal-qr" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: #fff; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; position: relative;">
            <button onclick="cerrarModalQR()" style="position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 25px; cursor: pointer;">&times;</button>
            <h3 style="color: #333; margin-bottom: 15px;">Mi Identidad Dropis</h3>
            <div id="contenedor-qr">
                <p style="color: #666;">Generando tu código...</p>
            </div>
            <button onclick="cerrarModalQR()" style="margin-top: 20px; width: 100%; padding: 10px; background: #6b8e23; color: white; border: none; border-radius: 10px; font-weight: bold;">CERRAR</button>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCaUyhX2iBMl4A5xeKeu_4SeE6HClp4V1s",
            authDomain: "real-market-elite-2025.firebaseapp.com",
            projectId: "real-market-elite-2025",
            databaseURL: "https://real-market-elite-2025-default-rtdb.firebaseio.com",
            storageBucket: "real-market-elite-2025.appspot.com",
            messagingSenderId: "226489002778",
            appId: "1:226489002778:web:6722d21a9e78b33b5b1aa3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const messaging = firebase.messaging();
        const miVapidKey = 'BIrsA9YbBXfIuo4PTMrKRtuktRsK2RbK0XevupuofGGOUDy9w5VZ9yaXbZXsenXppmFsR62-2B7jBOG0Z8RdxvU';

        // 2. IDENTIDAD Y QR
        const miID = localStorage.getItem('usuarioID') || localStorage.getItem('mi_dropis_id') || "Sin ID";
        document.getElementById('mi-id-display').innerText = "Tu ID: " + miID;

        function cerrarModalQR() {
            document.getElementById('modal-qr').style.display = 'none';
        }

        // 3. REGISTRO DE ANTENA (SERVICE WORKER)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Usamos la v7 que mencionaste para limpiar caché
                navigator.serviceWorker.register('./firebase-messaging-sw.js?v=7')
                    .then(reg => {
                        console.log("🚀 Antena Dropis Lite Operativa");
                        
                        // Pedir Token una vez que el SW esté listo
                        if (Notification.permission === 'granted') {
                            obtenerToken(reg);
                        }
                    })
                    .catch(err => console.error("❌ Error Antena:", err));
            });

            // ESCUCHADOR: El Service Worker le habla a la pantalla
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data.type === 'NUEVO_MENSAJE_SATELITAL' || event.data.type === 'RESPUESTA_NUBE') {
                    renderizarMensajeEnPantalla(event.data.texto, event.data.nombre || '🛰️ Satélite');
                }
            });
        }

        function obtenerToken(registration) {
            messaging.getToken({ vapidKey: miVapidKey, serviceWorkerRegistration: registration })
                .then(token => {
                    if (token) {
                        console.log("🎫 Token Activo:", token);
                        localStorage.setItem('fcm_token', token);
                    }
                });
        }

        // 4. LÓGICA DE INTERFAZ
        function renderizarMensajeEnPantalla(texto, remitente) {
            const box = document.getElementById('chat-box');
            if (box) {
                const div = document.createElement('div');
                div.className = 'msg-burbuja msg-izquierda';
                div.innerHTML = `<small style="color:#25d366; font-weight:bold;">${remitente}</small><br>${texto}`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            }
        }

        function enviarMensajeSatelital() {
            const input = document.getElementById('msg-text');
            const texto = input.value.trim();
            
            if (texto === "") return;

            // Pintamos nuestro mensaje en la derecha
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'msg-burbuja msg-derecha';
            div.innerText = texto;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;

            // Aquí llamarías a tu función window.enviarMensajeUI() de app.js
            if (typeof window.enviarMensajeUI === 'function') {
                window.enviarMensajeUI();
            } else {
                console.log("📡 Mensaje listo para enviar a la nube...");
                // Simulación de envío si no está cargado app.js
                input.value = "";
            }
        }

        // 5. NOTIFICACIONES
        if ('Notification' in window && Notification.permission !== 'granted') {
            Notification.requestPermission();
        }

        messaging.onMessage((payload) => {
            console.log('☁️ Mensaje en primer plano:', payload);
            renderizarMensajeEnPantalla(payload.notification.body, payload.notification.title || "Dropis");
        });
    </script>
</body>
</html>

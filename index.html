    <script>
                

        // 1. CONFIGURACIÓN Y REGISTRO DE ANTENA (INDISPENSABLE PARA EL TOKEN)
        
const firebaseConfig = {
    apiKey: "AIzaSyCaUyhX2iBMl4A5xeKeu4SeE6HClp4V1s",
    authDomain: "real-market-elite-2025.firebaseapp.com",
    projectId: "real-market-elite-2025",
    databaseURL: "https://real-market-elite-2025-default-rtdb.firebaseio.com",
    messagingSenderId: "226489002778",
    appId: "1:226489002778:web:6722d21a9e78b33b5b1aa3"
};
firebase.initializeApp(firebaseConfig);
const messaging = firebase.messaging();
const db = firebase.database();

// --- 2. MOTOR DE PERSISTENCIA (IndexedDB) ---
const dbNombre = "DropisDB";
const dbVersion = 1;

function abrirDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbNombre, dbVersion);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('mensajes')) db.createObjectStore('mensajes', { autoIncrement: true });
            if (!db.objectStoreNames.contains('usuario')) db.createObjectStore('usuario', { keyPath: 'id' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject("Error DB");
    });
}

async function guardarLocal(tabla, datos) {
    const db = await abrirDB();
    const tx = db.transaction(tabla, 'readwrite');
    tx.objectStore(tabla).put(datos);
}

// --- 3. SOLO REGISTRO Y RECUPERACIÓN ---

async function recuperarCuentaConID() {
    const idParaRecuperar = prompt("Escribe tu ID Dropis:");
    if (!idParaRecuperar) return;

    try {
        const snapshot = await firebase.database().ref('usuarios/' + idParaRecuperar).once('value');
        if (snapshot.exists()) {
            const datos = snapshot.val();
            // Restaurar en el teléfono
            localStorage.setItem('mi_dropis_id', idParaRecuperar);
            await guardarLocal('usuario', { 
                id: 'perfil_propietario', 
                dropis_id: idParaRecuperar,
                nombre: datos.nombre,
                apellido: datos.apellido,
                fcm_token: datos.fcm_token || '' 
            });
            alert(`🚀 ¡Identidad recuperada! Bienvenido ${datos.nombre}.`);
            location.reload(); 
        } else {
            alert("❌ ID no encontrado en el satélite.");
        }
    } catch (e) {
        alert("Error de conexión satelital.");
    }
}
async function ejecutarRegistroCompleto() {
    const nombre = document.getElementById('reg-nombre').value.trim();
    const apellido = document.getElementById('reg-apellido').value.trim();
    
    if (!nombre || !apellido) return alert("Completa los datos");

    // 1. GENERACIÓN DEL ID CON LA LÓGICA SUB12
    // Genera algo como: TU_ID_DROPIS_SUB12_X8J2K
    const hash = Math.random().toString(36).substring(2, 7).toUpperCase();
    const idUnico = Math.random().toString(36).substring(2, 14); + hash; 

    // 2. PREPARAR DATOS PARA LOCAL (IndexedDB)
    const datosUsuario = { 
        id: 'perfil_propietario', 
        dropis_id: idUnico, 
        nombre: nombre, 
        apellido: apellido, 
        fecha: Date.now() 
    };

    // Guardar en el teléfono (Local)
    localStorage.setItem('mi_dropis_id', idUnico);
    await guardarLocal('usuario', datosUsuario);
    
    // Actualizar interfaz
    document.getElementById('modal-registro').style.display = 'none';
    document.getElementById('mi-id-display').innertext = "Tu ID: " + idUnico;
    
    const modalHuella = document.getElementById('modal-huella');
    if(modalHuella) modalHuella.style.display = 'flex';

    try {
        // 3. OBTENER TOKEN SATELITAL (FCM)
        const registration = await navigator.serviceWorker.ready;
        const token = await messaging.getToken({ 
            vapidKey: 'BIrsA9YbBXfIuo4PTMrKRtuktRsK2RbK0XevupuofGGOUDy9w5VZ9yaXbZXsenXppmFsR62-2B7jBOG0Z8RdxvU',
            serviceWorkerRegistration: registration 
        });
        
        if (token) {
            localStorage.setItem('fcm_token', token);

            // 4. LÓGICA DE GUARDADO EN LA NUBE (LA QUE NECESITAS)
            // Esto crea una ruta: usuarios/TU_ID_DROPIS_SUB12_XXXXX/
            await db.ref('usuarios/' + idUnico).set({
                id_sistema: idUnico,
                nombre: nombre,
                apellido: apellido,
                fcm_token: token,
                estado: "activo",
                version: "LITE_SUB12",
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            console.log("✅ Sincronizado con éxito en la nube bajo: " + idUnico);
        }
        
        setTimeout(() => { if(modalHuella) modalHuella.style.display = 'none'; }, 3000);
    } catch (e) { 
        console.error("⚠️ Error en vinculación satelital:", e);
        // Aunque falle el token, el usuario ya se creó localmente
        setTimeout(() => { if(modalHuella) modalHuella.style.display = 'none'; }, 2000);
    }
}

// --- 4. ANTENA SATELITAL ---

            async function activarAntena() {
    const miID = localStorage.getItem('mi_dropis_id');
    if (!miID) return;

    if (window.listenerActivo) window.listenerActivo.off(); 

    window.listenerActivo = db.ref('cola_satelital/' + miID);
    
    window.listenerActivo.on('child_added', async (snapshot) => {
        const data = snapshot.val();
        if (!data || !data.p) return; 

        try {
            const root = await cargarProto();
            const SuperAppPayload = root.lookupType("SuperAppPayload");
            const buffer = Uint8Array.from(atob(data.p), c => c.charCodeAt(0));
            const decoded = SuperAppPayload.decode(buffer);
            const textoReal = decodeURIComponent(escape(atob(decoded.chatText)));

            const emisorID = data.from; 
            const chatAbiertoActualmente = document.querySelector('#target-id').value;

            // 1. Guardar mensaje en el historial
            let clave = 'chat_' + emisorID;
            let historial = JSON.parse(localStorage.getItem(clave)) || [];
            historial.push({ texto: textoReal, clase: 'msg-izquierda' });
            localStorage.setItem(clave, JSON.stringify(historial));

            // 2. Lógica de Notificaciones y Contadores
            if (emisorID === chatAbiertoActualmente) {
                pintarMensaje(textoReal, 'msg-izquierda');
            } else {
                // Aumentar contador de mensajes no leídos
                let noLeidos = parseInt(localStorage.getItem('unread_' + emisorID)) || 0;
                localStorage.setItem('unread_' + emisorID, noLeidos + 1);
                
                // Actualizar la lista de contactos visualmente
                pintarAgendaContactos();

                // Notificación del teléfono (Arriba)
                mostrarNotificacionNativa("Nuevo mensaje de SpaceChat", textoReal);
            }

            snapshot.ref.remove(); 
        } catch (e) { console.error(e); }
    });
}

async function cargarProto() {
    const schema = `
        package superapp;
        syntax = "proto3";
        message SuperAppPayload {
            string chatText = 1;
        }
    `;
    const root = protobuf.parse(schema).root;
    return root;
}

// Variable necesaria para que el menú sepa a qué mensaje le diste clic
let mensajeSeleccionado = null;
 
    // Tu código del menú (onclick) se queda igualito abajo...
    function pintarMensaje(texto, clase, hora = null, estado = 'enviado') {
    const box = document.getElementById('chat-box');
    if (!box) return;

    const div = document.createElement('div');
    div.className = 'msg-burbuja ' + clase;

    const tiempo = hora || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
    const checkIcon = (estado === 'leido') ? '✓✓' : '✓';

    let contenidoHTML = "";
    if (texto && texto.includes("Resp >")) {
        const partes = texto.split("\n— ");
        const cabezalCita = partes[0].replace("Resp >", "").trim(); // Limpiamos el texto
        const mensajeReal = partes[1] || "";
        
        div.style.backgroundColor = "#2a2a2a"; 
        div.style.border = "1px solid rgba(255,215,0,0.2)";
 
        contenidoHTML = `
            <div style="font-size: 11px; opacity: 0.5; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0; margin: 0 0 2px 0; line-height: 1; font-style: italic;">
                Resp: ${cabezalCita}
            </div>
            <div style="margin: 0; padding: 0; line-height: 1.1;">${mensajeReal}</div>
        `;
    } else {
        contenidoHTML = `<div style="line-height: 1.2;">${texto}</div>`;
    }

    div.innerHTML = `
        ${contenidoHTML}
        <div class="msg-info" style="align-self: flex-end; font-size: 9px; opacity: 0.6; margin-top: 2px; display: flex; gap: 3px;">
            ${tiempo} <span class="checks" style="color: #4fc3f7;">${checkIcon}</span>
        </div>
    `;

    div.onclick = (e) => {
        mensajeSeleccionado = div; 
        const menu = document.getElementById('menu-acciones');
        if(menu) {
            menu.style.display = 'block';
            menu.style.top = e.pageY + "px";
            menu.style.left = (e.pageX > 200 ? e.pageX - 150 : e.pageX) + "px";
        }
        e.stopPropagation(); 
    };

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
        }
 
// Función para ejecutar las acciones del menú
function accionMensaje(tipo) {
    if (!mensajeSeleccionado) return;
    
    const textoOriginal = mensajeSeleccionado.innerText;
    const inputMsg = document.querySelector('#msg-text');
    const inputTarget = document.querySelector('#target-id');
 
    // --- EL CEREBRO PARA SUBIR LA CITA ---
    if (tipo === 'responder') {
    // Buscamos solo el div del mensaje, ignorando el de la hora (msg-info)
    const corpo = mensajeSeleccionado.querySelector('div:first-child');
    let cita = corpo ? corpo.innerText : mensajeSeleccionado.innerText;
    
    // Limpiamos si la cita es muy larga para que no haga la burbuja gigante
    if(cita.length > 50) cita = cita.substring(0, 50) + "...";

    inputMsg.value = `Resp > ${cita.trim()}\n— `;
    inputMsg.focus();
    }
        
    else if (tipo === 'editar') {
        inputMsg.value = textoOriginal;
        // Al editar, borramos el viejo para sobreescribir
        borrarMensajeDeMemoria(textoOriginal);
        mensajeSeleccionado.remove();
        inputMsg.focus();
    } 
    else if (tipo === 'copiar-id') {
        if(inputTarget) {
            inputTarget.value = textoOriginal.trim();
            inputTarget.style.boxShadow = "0 0 10px #ffd700";
            setTimeout(() => inputTarget.style.boxShadow = "none", 1000);
        }
    } 
    else if (tipo === 'borrar') {
        if(confirm("¿Borrar mensaje para siempre?")) {
            borrarMensajeDeMemoria(textoOriginal);
            mensajeSeleccionado.remove();
        }
    }
 
    document.getElementById('menu-acciones').style.display = 'none';
}
 
// Esta función es para que el borrado sea REAL y no vuelvan al recargar
function borrarMensajeDeMemoria(texto) {
    const idDestino = document.querySelector('#target-id').value;
    if(!idDestino) return;

    const claveChat = 'chat_' + idDestino;
    let mensajes = JSON.parse(localStorage.getItem(claveChat)) || [];
    
    mensajes = mensajes.filter(m => m.texto !== texto);
    localStorage.setItem(claveChat, JSON.stringify(mensajes));
}

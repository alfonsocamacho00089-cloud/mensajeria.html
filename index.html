// --- 2. MOTOR DE PERSISTENCIA (IndexedDB) ---
const dbNombre = "DropisDB";
const dbVersion = 1;

function abrirDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbNombre, dbVersion);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('mensajes')) db.createObjectStore('mensajes', { autoIncrement: true });
            if (!db.objectStoreNames.contains('usuario')) db.createObjectStore('usuario', { keyPath: 'id' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject("Error DB");
    });
}

async function guardarLocal(tabla, datos) {
    const db = await abrirDB();
    const tx = db.transaction(tabla, 'readwrite');
    tx.objectStore(tabla).put(datos);
}

async function recuperarCuentaConID() {
    const idParaRecuperar = prompt("Escribe tu ID Dropis:");
    if (!idParaRecuperar) return;

    try {
        const snapshot = await firebase.database().ref('usuarios/' + idParaRecuperar).once('value');
        if (snapshot.exists()) {
            const datos = snapshot.val();
            // Restaurar en el teléfono
            localStorage.setItem('mi_dropis_id', idParaRecuperar);
            await guardarLocal('usuario', { 
                id: 'perfil_propietario', 
                dropis_id: idParaRecuperar,
                nombre: datos.nombre,
                apellido: datos.apellido,
                fcm_token: datos.fcm_token || '' 
            });
            alert(`🚀 ¡Identidad recuperada! Bienvenido ${datos.nombre}.`);
            location.reload(); 
        } else {
            alert("❌ ID no encontrado en el satélite.");
        }
    } catch (e) {
        alert("Error de conexión satelital.");
    }
}

async function activarAntena() {
    const miID = localStorage.getItem('mi_dropis_id');
    if (!miID) return;

    if (window.listenerActivo) window.listenerActivo.off(); 

    console.log("📡 Antena sintonizada en:", miID);
    window.listenerActivo = db.ref('cola_satelital/' + miID);
    
    window.listenerActivo.on('child_added', async (snapshot) => {
        const data = snapshot.val();
        if (!data || !data.p) return; // Si el paquete viene vacío, ignorar

        try {
            // 1. Cargar la estructura del mensaje
            const root = await cargarProto();
            const SuperAppPayload = root.lookupType("SuperAppPayload");
            
            // 2. Decodificar Base64 a binario y luego a Objeto
            const buffer = Uint8Array.from(atob(data.p), c => c.charCodeAt(0));
            const decoded = SuperAppPayload.decode(buffer);
// Después de: const decoded = SuperAppPayload.decode(buffer);
// Traducimos el mensaje protegido a texto real
const textoReal = decodeURIComponent(escape(atob(decoded.chatText)));
pintarMensaje(textoReal, 'msg-izquierda');
            // 3. Guardar en historial local (IndexedDB)
            await guardarLocal('mensajes', {
    // Usamos 'data.p' o 'decoded.p' que es donde viene el texto real en tu red
    texto: textoReal|| "Mensaje sin texto",
    remitente: data.from || "Desconocido",
    ts: Date.now()
});
console.log("✅ Guardado automático ejecutado con éxito");
let historial = JSON.parse(localStorage.getItem('mis_mensajes')) || [];
historial.push({ texto: textoReal, clase: 'msg-izquierda' });
localStorage.setItem('mis_mensajes', JSON.stringify(historial));
            // 4. Mostrar en pantalla
            
            
            // 5. Borrar de la nube (limpieza satelital) para no procesarlo dos veces
            snapshot.ref.remove(); 
            
        // Dentro de activarAntena...
} catch (e) { 
    console.error("❌ Error decodificando:", e);
    // Si falla el proto, intentamos mostrar que llegó algo crudo
    pintarMensaje("Error al decodificar paquete: " + data.p.substring(0,10) + "...", 'msg-izquierda');
        }
    });
}
       
        

async function enviarMensajeSatelital() {
const inputMsg = document.querySelector('#msg-text');
const inputTarget = document.querySelector('#target-id');
const msg = inputMsg ? inputMsg.value.trim() : "";
const targetID = inputTarget ? inputTarget.value.trim() : "";
const miID = localStorage.getItem('mi_dropis_id') || "ID_DESCONOCIDO";

    if (!targetID || !msg) return alert("ID y Mensaje son obligatorios");

    try {
        // 1. Preparamos el Payload (ProtoBuf)
        const root = await cargarProto();
        const SuperAppPayload = root.lookupType("SuperAppPayload");
        // Antes de: const payload = SuperAppPayload.create({ chatText: msg });
// Ofuscamos el mensaje para que no sea legible en la consola de Firebase
const msgProtegido = btoa(unescape(encodeURIComponent(msg))); 
const payload = SuperAppPayload.create({ chatText: msgProtegido });
        
        const buffer = SuperAppPayload.encode(payload).finish();
        
        // 2. Convertimos a Base64 para el viaje satelital
        const base64 = btoa(String.fromCharCode.apply(null, buffer));
        // 3. Lo lanzamos a la cola del destinatario
        await db.ref('cola_satelital/' + targetID).push({
            p: base64,         // El paquete cifrado/empaquetado
            from: miID,        // Quién lo envía
            ts: Date.now()     // Marca de tiempo
        });

        // 4. Pintamos nuestro propio mensaje en la derecha
        pintarMensaje(msg, 'msg-derecha');
        // ... dentro de enviarMensajeSatelital, después de pintarMensaje(msg, 'msg-derecha');


// --- AÑADE ESTO PARA GUARDAR LO QUE ENVÍAS ---
let historialEnv = JSON.parse(localStorage.getItem('mis_mensajes')) || [];
historialEnv.push({ texto: msg, clase: 'msg-derecha' });
localStorage.setItem('mis_mensajes', JSON.stringify(historialEnv));
// ----------------------------------------------

if (inputMsg) inputMsg.value = "";
        
    
        console.log("🚀 Mensaje lanzado al espacio hacia:", targetID);

    } catch (e) {
        console.error("❌ Fallo en el lanzamiento:", e);
        alert("Error al enviar el mensaje.");
    }
}

async function cargarProto() {
    const schema = `
        package superapp;
        syntax = "proto3";
        message SuperAppPayload {
            string chatText = 1;
        }
    `;
    const root = protobuf.parse(schema).root;
    return root;
}

                Resp: ${cabezalCita}
            </div>
            <div style="margin: 0; padding: 0; line-height: 1.1;">${mensajeReal}</div>
        `;
    } else {
        contenidoHTML = `<div style="line-height: 1.2;">${texto}</div>`;
    }

    div.innerHTML = `
        ${contenidoHTML}
        <div class="msg-info" style="align-self: flex-end; font-size: 9px; opacity: 0.6; margin-top: 2px; display: flex; gap: 3px;">
            ${tiempo} <span class="checks" style="color: #4fc3f7;">${checkIcon}</span>
        </div>
    `;

    div.onclick = (e) => {
        mensajeSeleccionado = div; 
        const menu = document.getElementById('menu-acciones');
        if(menu) {
            menu.style.display = 'block';
            menu.style.top = e.pageY + "px";
            menu.style.left = (e.pageX > 200 ? e.pageX - 150 : e.pageX) + "px";
        }
        e.stopPropagation(); 
    };

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
        }
 
// Función para ejecutar las acciones del menú
function accionMensaje(tipo) {
    if (!mensajeSeleccionado) return;
    
    const textoOriginal = mensajeSeleccionado.innerText;
    const inputMsg = document.querySelector('#msg-text');
    const inputTarget = document.querySelector('#target-id');
 
    // --- EL CEREBRO PARA SUBIR LA CITA ---
    if (tipo === 'responder') {
    // Buscamos solo el div del mensaje, ignorando el de la hora (msg-info)
    const corpo = mensajeSeleccionado.querySelector('div:first-child');
    let cita = corpo ? corpo.innerText : mensajeSeleccionado.innerText;
    
    // Limpiamos si la cita es muy larga para que no haga la burbuja gigante
    if(cita.length > 50) cita = cita.substring(0, 50) + "...";

    inputMsg.value = `Resp > ${cita.trim()}\n— `;
    inputMsg.focus();
    }
        
    else if (tipo === 'editar') {
        inputMsg.value = textoOriginal;
        // Al editar, borramos el viejo para sobreescribir
        borrarMensajeDeMemoria(textoOriginal);
        mensajeSeleccionado.remove();
        inputMsg.focus();
    } 
    else if (tipo === 'copiar-id') {
        if(inputTarget) {
            inputTarget.value = textoOriginal.trim();
            inputTarget.style.boxShadow = "0 0 10px #ffd700";
            setTimeout(() => inputTarget.style.boxShadow = "none", 1000);
        }
    } 
    else if (tipo === 'borrar') {
        if(confirm("¿Borrar mensaje para siempre?")) {
            borrarMensajeDeMemoria(textoOriginal);
            mensajeSeleccionado.remove();
        }
    }
 
    document.getElementById('menu-acciones').style.display = 'none';
}
 
// Esta función es para que el borrado sea REAL y no vuelvan al recargar
function borrarMensajeDeMemoria(texto) {
    let mensajes = JSON.parse(localStorage.getItem('mis_mensajes')) || [];
    // Filtramos para quitar el mensaje que coincida con el texto
    mensajes = mensajes.filter(m => m.texto !== texto);
    localStorage.setItem('mis_mensajes', JSON.stringify(mensajes));
}
 
// Cerrar el menú si tocas fuera
document.addEventListener('click', () => {
    const menu = document.getElementById('menu-acciones');
    if(menu) menu.style.display = 'none';
});
        
function cargarMensajesLocales() {
    const datos = localStorage.getItem('mis_mensajes');
    if (!datos) return; 
 
    try {
        const mensajesGuardados = JSON.parse(datos);
        mensajesGuardados.forEach(msg => {
            // Usamos tu función real 'pintarMensaje'
            if (typeof pintarMensaje === "function") {
                pintarMensaje(msg.texto, msg.clase); 
            }
        });
    } catch (e) {
        console.error("Error al cargar memoria local", e);
    }
}

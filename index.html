<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropis Message Lite 🛰️</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.4/dist/protobuf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #1a1a1a; padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid #ffd700; position: relative; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Diseño de burbujas según tu Motor */
        .msg-burbuja { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; margin: 2px 0; }
        .msg-izquierda { background: #005c4b; align-self: flex-start; border-left: 5px solid #25d366; }
        .msg-derecha { background: #2a2a2a; align-self: flex-end; }
        
        .btn-qr-dropis { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: #ffd700; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="header">
        DROPSIS CHAT LITE 🛰️
        <button class="btn-qr-dropis" onclick="manejarBotonIdentidad()">🪪</button>
    </div>

    <div id="chat-box"></div>

    <div id="modal-registro" class="modal">
        <div class="modal-content">
            <h3>Registro Maestro</h3>
            <input type="text" id="reg-nombre" placeholder="Nombre">
            <input type="text" id="reg-apellido" placeholder="Apellido">
            <button onclick="ejecutarRegistroCompleto()" style="width: 100%; padding: 12px; background: #ffd700; border: none; border-radius: 10px; font-weight: bold;">VALIDAR HUELLA Y CREAR</button>
        </div>
    </div>

    <div id="modal-qr" class="modal">
        <div class="modal-content">
            <h3>Mi Identidad Dropis</h3>
            <div id="contenedor-qr"></div>
            <button onclick="cerrarModalQR()" style="margin-top: 20px; width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 10px;">CERRAR</button>
        </div>
    </div>

    <div style="display: flex; gap: 8px; background: #1a1a1a; padding: 10px;">
        <input type="text" id="target-id" placeholder="ID Destino" style="width: 80px;">
        <input type="text" id="msg-text" placeholder="Mensaje...">
        <button onclick="enviarMensajeSatelital()" style="background: #ffd700; border: none; padding: 10px; border-radius: 8px;">ENVIAR</button>
    </div>

    <script>
        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCaUyhX2iBMl4A5xeKeu_4SeE6HClp4V1s",
            authDomain: "real-market-elite-2025.firebaseapp.com",
            projectId: "real-market-elite-2025",
            databaseURL: "https://real-market-elite-2025-default-rtdb.firebaseio.com",
            messagingSenderId: "226489002778",
            appId: "1:226489002778:web:6722d21a9e78b33b5b1aa3"
        };
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // --- TU MOTOR LÓGICO (SIN CAMBIOS) ---
        const E_RELOJ = 0, E_ENVIADO = 1, E_RECIBIDO = 2, E_LEIDO = 3;
        const DB_VERSION = 7;
        let listenerActivo = null;

        // Base de Datos IndexedDB para el historial
        function inicializarDB() {
            const req = indexedDB.open('DropisDB', DB_VERSION);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('mensajes')) {
                    db.createObjectStore('mensajes', { keyPath: 'id' });
                }
            };
        }

        async function ejecutarRegistroCompleto() {
            const nombre = document.getElementById('reg-nombre').value.trim();
            const apellido = document.getElementById('reg-apellido').value.trim();
            if (!nombre || !apellido) return alert("Completa los datos");

            // Simulación de huella de tu código
            const idFinal = await crearCuentaMaestra(`${nombre} ${apellido}`);
            if (idFinal) {
                localStorage.setItem('mi_dropis_id', idFinal);
                document.getElementById('modal-registro').style.display = 'none';
                mostrarMiQR(idFinal);
                sincronizarTokenDispositivo(); // AQUÍ SE GENERA EL TOKEN
            }
        }

        async function crearCuentaMaestra(nombre) {
            const idUnico = Math.random().toString(36).substring(2, 14); // Simplificado para el ejemplo
            await firebase.database().ref('usuarios/' + idUnico).set({ nombre, creado_en: Date.now() });
            return idUnico;
        }

        function mostrarMiQR(idUnico) {
            const contenedor = document.getElementById('contenedor-qr');
            contenedor.innerHTML = "";
            new QRCode(contenedor, {
                text: `dropisapp://perfil/${idUnico}`,
                width: 180, height: 180
            });
            const p = document.createElement("p");
            p.innerText = "ID: " + idUnico;
            contenedor.appendChild(p);
        }

        async function sincronizarTokenDispositivo() {
            try {
                const miID = localStorage.getItem('mi_dropis_id');
                // IMPORTANTE: Aquí debes poner tu VAPID KEY real para que el token salga
                const token = await messaging.getToken({ vapidKey: 'BIrsA9YbBXfIuo4PTMrKRtuktRsK2RbK0XevupuofGGOUDy9w5VZ9yaXbZXsenXppmFsR62-2B7jBOG0Z8RdxvU' });
                if (token) {
                    console.log("🎫 TOKEN GENERADO:", token);
                    await firebase.database().ref(`tokens_dispositivos/${miID}`).set({ token, plataforma: 'web' });
                }
            } catch (e) { console.warn("Error Token:", e); }
        }

        function manejarBotonIdentidad() {
            const id = localStorage.getItem('mi_dropis_id');
            if (id) {
                document.getElementById('modal-qr').style.display = 'flex';
                mostrarMiQR(id);
            } else {
                document.getElementById('modal-registro').style.display = 'flex';
            }
        }

        function cerrarModalQR() { document.getElementById('modal-qr').style.display = 'none'; }

        // --- AL CARGAR ---
        window.onload = () => {
            inicializarDB();
            const id = localStorage.getItem('mi_dropis_id');
            if (!id) document.getElementById('modal-registro').style.display = 'flex';
            else sincronizarTokenDispositivo();
        };

        // Escuchar mensajes del Service Worker
        navigator.serviceWorker.addEventListener('message', e => {
            if (e.data.type === 'NUEVO_MENSAJE_SATELITAL') {
                // Aquí llamarías a cargarMensajes() de tu motor
            }
        });
    </script>
</body>
</html>
